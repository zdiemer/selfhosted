# ============================================================================
# Hasturian Era  |  10 players  |  PaperMC + plugins (no client mods needed)
# ----------------------------------------------------------------------------
# Vanilla clients connect directly — no launcher, no mods. Players must pick
# "release 1.21.11" in their launcher Installations tab (vanilla MC is now
# on calendar versioning 26.x, but Paper is still on the 1.21.x line).
# All content comes from server-side plugins, auto-installed on pod start
# via Modrinth (MODRINTH_PROJECTS) and direct URLs (PLUGINS).
#
# Install:
#   helm repo add itzg https://itzg.github.io/minecraft-server-charts/
#   helm repo update
#   helm install mc itzg/minecraft -f values.yaml
#
# Upgrade (plugin bumps, resource changes, etc.):
#   ./upgrade.sh         # flush, backup, helm upgrade, tail logs
#
# Console access:
#   kubectl exec -it mc-minecraft-0 -- rcon-cli
# ============================================================================

image: itzg/minecraft-server
# java21 covers 1.21.x (Paper's current line).
imageTag: java21

# Critical: never run two pods against the same world. Recreate = old pod dies
# completely before new pod starts. RollingUpdate WILL corrupt your world.
strategy:
  type: Recreate

# ----------------------------------------------------------------------------
# Minecraft server configuration
# ----------------------------------------------------------------------------
minecraftServer:
  eula: "TRUE"

  # PaperMC — Bukkit-API fork with strong performance and full plugin support.
  # Pinned to 1.21.11 (Paper's current stable). Vanilla MC has moved to
  # calendar versioning (26.x); Paper hasn't caught up yet, so players must
  # select "release 1.21.11" in their launcher installations.
  type: "PAPER"
  version: "1.21.11"

  serverName: "Hasturian Era"
  motd: "§6Hasturian Era §7| §fRPG + Magic"
  difficulty: "normal"
  maxPlayers: 10

  # Paper is lean; 10/8 is comfortable for 10 players.
  viewDistance: 10
  simulationDistance: 8

  # Comma-separated usernames; the container resolves UUIDs.
  whitelist: "starfoxa"
  enforceWhitelist: true
  ops: "starfoxa"

  # Paper + this plugin stack is light compared to modded. 3G heap covers
  # 10 players with room for Slimefun/MythicMobs; bump if TPS drops.
  memory: "3G"

  # Aikar's G1GC flags — Paper team's documented defaults.
  # See https://docs.papermc.io/paper/aikars-flags
  jvmXXOpts: >-
    -XX:+UseG1GC
    -XX:+ParallelRefProcEnabled
    -XX:MaxGCPauseMillis=200
    -XX:+UnlockExperimentalVMOptions
    -XX:+DisableExplicitGC
    -XX:+AlwaysPreTouch
    -XX:G1NewSizePercent=30
    -XX:G1MaxNewSizePercent=40
    -XX:G1HeapRegionSize=8M
    -XX:G1ReservePercent=20
    -XX:G1HeapWastePercent=5
    -XX:G1MixedGCCountTarget=4
    -XX:InitiatingHeapOccupancyPercent=15
    -XX:G1MixedGCLiveThresholdPercent=90
    -XX:G1RSetUpdatingPauseTimePercent=5
    -XX:SurvivorRatio=32
    -XX:+PerfDisableSharedMem
    -XX:MaxTenuringThreshold=1

  # RCON for admin console access. Do NOT expose this port publicly.
  # Access via: kubectl exec -it mc-minecraft-0 -- rcon-cli
  rcon:
    enabled: true
    port: 25575
    # Create:   kubectl create secret generic mc-rcon --from-literal=password="$(openssl rand -base64 24)"
    # Retrieve: kubectl get secret mc-rcon -o jsonpath='{.data.password}' | base64 -d
    existingSecret: "mc-rcon"
    secretKey: "password"
    password: ""

  # Auto-pause suspends the JVM when no players are online. Modest win on a
  # plugin server (~1GB idle) but still worth enabling.
  autoPause:
    enabled: true
    timeoutInit: 600           # wait 10min after start for first player
    timeoutEstablished: 3600   # pause after 1h idle
    period: 10

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
# itzg's image downloads plugins on every container start:
#   MODRINTH_PROJECTS — auto-pulls latest compatible version from Modrinth
#   PLUGINS           — direct URLs for plugins not on Modrinth
# Plugin config persists on the data PVC under /data/plugins/<name>/.
#
# To pin a plugin version, change `plugin:<slug>` to `plugin:<slug>:<versionId>`
# (find version IDs via the Modrinth page or API).
extraEnv:
  # The itzg parser splits on comma without trimming, so keep this on one line
  # with no spaces. `quests.classic` is PikaMug's Quests (in-game GUI creator);
  # plain `quests` is LMBishop's simpler YAML-config alternative.
  MODRINTH_PROJECTS: "plugin:luckperms,plugin:essentialsx,plugin:vaultunlocked,plugin:auraskills,plugin:mythicmobs,plugin:magicspells,plugin:quests.classic,plugin:worldedit,plugin:worldguard"
  # Slimefun and Citizens aren't on Modrinth. "latest" URLs are fine for a
  # private server; pin to specific builds for reproducibility across restarts.
  PLUGINS: "https://blob.build/dl/Slimefun4/Stable/LATEST,https://ci.citizensnpcs.co/job/Citizens2/lastStableBuild/artifact/dist/target/Citizens.jar"

# ----------------------------------------------------------------------------
# Resources
# ----------------------------------------------------------------------------
# 3G heap + ~1G off-heap (direct buffers, plugin allocations, mc-backup).
resources:
  requests:
    memory: 2Gi
    cpu: 1000m
  limits:
    memory: 5Gi
    cpu: 4000m

# ----------------------------------------------------------------------------
# Persistent storage
# ----------------------------------------------------------------------------
persistence:
  dataDir:
    enabled: true
    Size: 30Gi
    # storageClass: ""  # unset = cluster default

# ----------------------------------------------------------------------------
# Networking
# ----------------------------------------------------------------------------
# k3s ships klipper-lb, so LoadBalancer binds port 25565 directly on node IPs.
serviceType: LoadBalancer
externalTrafficPolicy: Local

# Never expose RCON externally.
rconServiceType: ClusterIP

# ----------------------------------------------------------------------------
# Backups via itzg/mc-backup sidecar
# ----------------------------------------------------------------------------
# The sidecar runs `save-off` → `save-all flush` → tar → `save-on` via RCON,
# which is the only way to get a consistent backup of a running world.
mcbackup:
  enabled: true
  image:
    repository: itzg/mc-backup
    tag: latest
  pullPolicy: IfNotPresent

  # Hourly backups; prune anything older than 2 days locally.
  # Pair this with offsite (rclone) for longer retention.
  backupInterval: "1h"
  pruneBackupsDays: 2
  initialDelay: "5m"

  # tar  = local tar.gz files on a PVC
  # rclone = push to S3/B2/R2/GCS/etc. (set envs below)
  backupMethod: tar

  # Graceful shutdown hooks — ensures backup runs before pod termination.
  pauseIfNoPlayers: "true"
  playersOnlineCheckInterval: "5m"

  persistence:
    backupDir:
      enabled: true
      Size: 50Gi

  # Local backups die with the PVC. For offsite, switch backupMethod to "rclone"
  # and mount a secret with rclone.conf. See itzg/mc-backup README for envs.

# ----------------------------------------------------------------------------
# Scheduling & reliability
# ----------------------------------------------------------------------------
# Prevent the cluster autoscaler from evicting the pod to consolidate nodes.
# A restart drops every player; worth pinning.
podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

# Pin to zachd-ubuntu — most RAM headroom, and it carries a PreferNoSchedule
# taint for talaria workloads.
nodeSelector:
  kubernetes.io/hostname: zachd-ubuntu