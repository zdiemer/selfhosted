{{/*
The same token, rendered into every namespace that has a reader: the release
namespace for the updater CronJob, and Traefik's namespace for the DNS-01
challenge. A secretKeyRef cannot cross namespaces, so one copy per reader is
the only option short of a secret-replicating controller.

The kube-system copy predates this chart (hand-created alongside the old
talaria-owned config). `upgrade.sh` stamps Helm's ownership metadata onto it
before installing, otherwise Helm refuses to adopt it and the install fails.
*/}}
{{- $root := . }}
{{- $namespaces := list }}
{{- if .Values.updater.enabled }}
{{- $namespaces = append $namespaces .Release.Namespace }}
{{- end }}
{{- if and .Values.traefik.enabled (not (has .Values.traefik.namespace $namespaces)) }}
{{- $namespaces = append $namespaces .Values.traefik.namespace }}
{{- end }}
{{- range $ns := $namespaces }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "duckdns.secretName" $root }}
  namespace: {{ $ns }}
  labels:
    {{- include "duckdns.labels" $root | nindent 4 }}
type: Opaque
stringData:
  token: {{ required "token is required (set it in values.local.yaml)" $root.Values.token | quote }}
{{- end }}
