{{/*
Rootless buildkitd, adapted from upstream's
examples/kubernetes/deployment+service.rootless.yaml (mTLS stripped — see the
README for that tradeoff; the NetworkPolicy is the gate instead).

The securityContext looks alarming, so in plain terms: rootlesskit must create
a user namespace and exec the setuid newuidmap/newgidmap helpers, which means
  - no `allowPrivilegeEscalation: false` (it would block the setuid helpers),
  - seccomp/AppArmor Unconfined (the default profiles deny unshare-with-userns
    on some kernels).
Everything still runs as uid 1000; nothing here grants root on the node.
Ubuntu 24.04 nodes additionally need kernel.apparmor_restrict_unprivileged_userns=0
— upgrade.sh pre-flights that, see the README.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "buildkit.fullname" . }}
  labels:
    {{- include "buildkit.labels" . | nindent 4 }}
spec:
  # One RWO cache PVC → one pod; Recreate so an upgrade never has two
  # buildkitds fighting over the same snapshot store.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "buildkit.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "buildkit.labels" . | nindent 8 }}
      annotations:
        # Legacy AppArmor annotation, kept alongside the securityContext field
        # below — the field is authoritative on k8s ≥1.30, the annotation is
        # belt-and-braces.
        container.apparmor.security.beta.kubernetes.io/buildkitd: unconfined
    spec:
      automountServiceAccountToken: false
      containers:
        - name: buildkitd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --addr
            - tcp://0.0.0.0:{{ .Values.service.port }}
            # Required for rootless-in-k8s: buildkitd can't create the pid
            # namespace sandbox for build processes without extra privileges.
            - --oci-worker-no-process-sandbox
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: Unconfined
            appArmorProfile:
              type: Unconfined
          ports:
            - name: buildkitd
              containerPort: {{ .Values.service.port }}
          # `buildctl debug workers` proves the daemon is up AND the rootless
          # oci worker initialized — the thing that fails when the userns
          # sysctl is wrong. --addr is required: the daemon listens on TCP
          # only (see args), and buildctl's default is a unix socket that
          # doesn't exist here — without it the probe kills a healthy daemon.
          readinessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://127.0.0.1:{{ .Values.service.port }}", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://127.0.0.1:{{ .Values.service.port }}", "debug", "workers"]
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: cache
              mountPath: /home/user/.local/share/buildkit
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: cache
          {{- if .Values.cache.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "buildkit.fullname" . }}-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
