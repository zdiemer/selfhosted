{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cluster-status.fullname" . }}
  labels:
    {{- include "cluster-status.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- if .Values.ingress.tls.enabled }}
    traefik.ingress.kubernetes.io/router.tls.certresolver: {{ .Values.ingress.tls.certResolver }}
    # Ride the wildcard SAN — DuckDNS can only write TXT at the top-level, so a
    # per-host cert for status.zachd.duckdns.org can't answer its challenge.
    traefik.ingress.kubernetes.io/router.tls.domains.0.main: {{ .Values.ingress.tls.domain | quote }}
    traefik.ingress.kubernetes.io/router.tls.domains.0.sans: {{ .Values.ingress.tls.wildcardSan | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cluster-status.fullname" . }}
                port:
                  number: 80
    {{- /*
      Hosts served over the Cloudflare tunnel. TLS for these terminates at
      Cloudflare's edge, so they're deliberately absent from the ACME cert list
      below — Traefik answers them with a name-mismatched cert that the tunnel
      never verifies. Same shape as every other service here.
    */}}
    {{- range .Values.ingress.cloudflareHosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cluster-status.fullname" $ }}
                port:
                  number: 80
    {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
  {{- end }}
{{- end }}
