{{/*
Read-only, and deliberately narrower than talaria's backend ClusterRole this was
ported from: that one also carries pods/log, jobs and cronjobs for other admin
handlers. The status collector needs none of those.

nodes/proxy is the powerful one — it's what reaches kubelet's /stats/summary for
the CPU/RAM/disk/network numbers, and it means no metrics-server is required.
It also means this ServiceAccount can proxy to kubelets, so nothing else should
borrow it.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cluster-status.fullname" . }}
  labels:
    {{- include "cluster-status.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cluster-status.fullname" . }}
  labels:
    {{- include "cluster-status.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["nodes/proxy", "nodes/stats"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cluster-status.fullname" . }}-{{ .Release.Namespace }}
  labels:
    {{- include "cluster-status.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cluster-status.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cluster-status.fullname" . }}
    namespace: {{ .Release.Namespace }}
