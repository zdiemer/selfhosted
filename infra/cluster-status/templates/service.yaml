apiVersion: v1
kind: Service
metadata:
  name: {{ include "cluster-status.fullname" . }}
  labels:
    {{- include "cluster-status.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "cluster-status.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
