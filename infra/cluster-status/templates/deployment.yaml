apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cluster-status.fullname" . }}
  labels:
    {{- include "cluster-status.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cluster-status.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pods when the script or the page changes — both are mounted
        # from ConfigMaps, and a ConfigMap edit alone would otherwise leave the
        # running collector on the old code until something else restarted it.
        checksum/collector: {{ include (print $.Template.BasePath "/collector-configmap.yaml") . | sha256sum }}
        checksum/web: {{ include (print $.Template.BasePath "/web-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "cluster-status.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cluster-status.fullname" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Spread across nodes: a status page that goes down with one node isn't
      # much of a status page.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "cluster-status.selectorLabels" . | nindent 20 }}
      volumes:
        - name: data
          emptyDir: {}
        - name: collector
          configMap:
            name: {{ include "cluster-status.fullname" . }}-collector
        - name: web
          configMap:
            name: {{ include "cluster-status.fullname" . }}-web
        # nginx creates its *_temp_path dirs at startup, so an empty volume here
        # is fine — but it needs somewhere writable, and the root fs is not.
        - name: nginx-cache
          emptyDir: {}
        # Separate volume: the unprivileged image writes its pid to /tmp, and
        # sharing one emptyDir would put nginx.pid inside the cache dir.
        - name: nginx-tmp
          emptyDir: {}
      containers:
        # The only thing that talks to the Kubernetes API. Public request volume
        # has no effect on it — it scrapes on its own fixed schedule.
        - name: collector
          image: {{ .Values.collector.image }}
          command: ["python3", "-u", "/app/collect.py"]
          securityContext:
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: INTERVAL_SECONDS
              value: {{ .Values.collector.intervalSeconds | quote }}
            - name: PUBLISH_EVENTS
              value: {{ .Values.publish.events | quote }}
            - name: PUBLISH_NODE_VERSIONS
              value: {{ .Values.publish.nodeVersions | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: collector
              mountPath: /app
              readOnly: true
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}

        # Serves two files off local disk and nothing else.
        - name: web
          image: {{ .Values.web.image }}
          securityContext:
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: web
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
            - name: web
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            # readOnlyRootFilesystem means nginx needs somewhere writable for
            # its caches and pid.
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
