# ============================================================================
# Prominence II: Hasturian Era  |  10 players  |  Fabric modpack (clients MUST
# install the modpack — vanilla clients can no longer connect)
# ----------------------------------------------------------------------------
# Server uses itzg's Modrinth modpack auto-installer: on boot it pulls the
# latest Prominence II: Hasturian Era .mrpack from Modrinth, fetches every
# server-side mod listed inside it, and launches Fabric on the MC version the
# modpack declares (currently 1.20.1). Player configuration (whitelist, ops,
# serverName, motd) lives in values.local.yaml (gitignored).
#
# Players need matching client mods — see CLIENT_SETUP.md.
#
# All paths below are relative to the repo root (this file lives at
# minecraft/values.yaml since the repo-wide restructure).
#
# First install (fresh cluster):
#   kubectl create namespace minecraft
#   kubectl -n minecraft create secret generic mc-rcon \
#     --from-literal=password="$(openssl rand -base64 24)"
#   helm repo add itzg https://itzg.github.io/minecraft-server-charts/
#   helm repo update
#   helm install mc itzg/minecraft -n minecraft \
#     -f minecraft/values.yaml -f minecraft/values.local.yaml
#
# Migrating an existing Paper/plugin install to this modpack:
#   The old 1.21.8 Paper world is NOT forward-compatible with 1.20.1 Fabric.
#   The mc-backup sidecar has hourly tarballs if you ever want to roll back.
#   Fastest clean cut — wipe the data PVC and let Helm regenerate it:
#     helm uninstall mc -n minecraft
#     kubectl -n minecraft delete pvc -l app=mc-minecraft
#     helm install mc itzg/minecraft -n minecraft \
#       -f minecraft/values.yaml -f minecraft/values.local.yaml
#   (The mc-rcon secret survives uninstall; no need to recreate it.)
#
# Upgrade (modpack version bumps, resource changes, etc.):
#   ./minecraft/upgrade.sh   # flush, backup, helm upgrade, tail logs
#
# Console access:
#   kubectl -n minecraft exec -it deploy/mc-minecraft -- rcon-cli
# ============================================================================

# java17 covers MC 1.20.1 (Prominence II's current line). Do NOT bump to
# java21 until the modpack itself moves to a 1.21.x Fabric build.
image:
  repository: itzg/minecraft-server
  tag: java17
  pullPolicy: IfNotPresent

# Critical: never run two pods against the same world. Recreate = old pod dies
# completely before new pod starts. RollingUpdate WILL corrupt your world.
strategy:
  type: Recreate

# ----------------------------------------------------------------------------
# Minecraft server configuration
# ----------------------------------------------------------------------------
minecraftServer:
  eula: "TRUE"

  # TYPE=MODRINTH + MODRINTH_MODPACK below tells itzg's startup scripts to
  # download the .mrpack, install Fabric Loader at the version declared in
  # the pack, and install every server-side mod it lists. `version` here
  # must match what the modpack targets — 1.20.1 for current Hasturian Era.
  # Bumping the modpack past a MC line means bumping this AND image.tag.
  type: "MODRINTH"
  version: "1.20.1"

  # serverName / motd live in values.local.yaml — server identity is per-operator.
  difficulty: "normal"
  maxPlayers: 10

  # NOTE: allow-flight is set via ALLOW_FLIGHT in extraEnv below — the itzg
  # chart only surfaces a curated subset of minecraftServer.* keys, and
  # `allowFlight` here is silently ignored (verified with `helm show values
  # itzg/minecraft`). All env-var-based itzg knobs go through extraEnv.

  # Modded chunks are heavy (more block entities, more mob AI). 8/6 is a
  # comfortable starting point; drop to 6/4 if TPS dips below 19.
  viewDistance: 8
  simulationDistance: 6

  # Comma-separated usernames; the container resolves UUIDs. Player identities
  # live in values.local.yaml (gitignored) so forks start with an empty roster.
  enforceWhitelist: true

  # Prominence II is a large modpack (~400 mods). 6G heap is the minimum the
  # pack authors recommend for a small server; bump if you see GC storms in
  # the logs or lag-spikes in-game.
  memory: "6G"

  # Aikar's G1GC flags — widely used across modded and vanilla alike.
  # See https://docs.papermc.io/paper/aikars-flags (applies equally to Fabric)
  jvmXXOpts: >-
    -XX:+UseG1GC
    -XX:+ParallelRefProcEnabled
    -XX:MaxGCPauseMillis=200
    -XX:+UnlockExperimentalVMOptions
    -XX:+DisableExplicitGC
    -XX:+AlwaysPreTouch
    -XX:G1NewSizePercent=30
    -XX:G1MaxNewSizePercent=40
    -XX:G1HeapRegionSize=8M
    -XX:G1ReservePercent=20
    -XX:G1HeapWastePercent=5
    -XX:G1MixedGCCountTarget=4
    -XX:InitiatingHeapOccupancyPercent=15
    -XX:G1MixedGCLiveThresholdPercent=90
    -XX:G1RSetUpdatingPauseTimePercent=5
    -XX:SurvivorRatio=32
    -XX:+PerfDisableSharedMem
    -XX:MaxTenuringThreshold=1

  # RCON for admin console access. Do NOT expose this port publicly.
  # Access via: kubectl exec -it mc-minecraft-0 -- rcon-cli
  rcon:
    enabled: true
    port: 25575
    # Never expose RCON externally.
    serviceType: ClusterIP
    # Create:   kubectl -n minecraft create secret generic mc-rcon --from-literal=password="$(openssl rand -base64 24)"
    # Retrieve: kubectl -n minecraft get secret mc-rcon -o jsonpath='{.data.password}' | base64 -d
    existingSecret: "mc-rcon"
    secretKey: "password"
    password: ""

  # Service — expose 25565 via LoadBalancer. k3s's klipper-lb binds this port
  # directly on node IPs, so the "external IP" column will show the node IPs.
  serviceType: LoadBalancer
  externalTrafficPolicy: Local

  # Auto-pause suspends the JVM when no players are online. Bigger win on a
  # modded server than on Paper (~3-4GB idle vs 6G active).
  autoPause:
    enabled: true
    timeoutInit: 600           # wait 10min after start for first player
    timeoutEstablished: 3600   # pause after 1h idle
    period: 10

  # BlueMap binds a webserver on 8100 inside the pod. klipper-lb publishes it
  # on node IPs; the talaria sibling project can front it with DuckDNS+TLS.
  # Both add-ons need one-time manual config after first boot — see
  # ADDON_SETUP.md for Discord bot token + BlueMap accept-download steps.
  extraPorts:
    - name: bluemap
      containerPort: 8100
      protocol: TCP
      service:
        enabled: true
        embedded: false
        type: LoadBalancer
        port: 8100
      ingress:
        enabled: false

# ----------------------------------------------------------------------------
# Modpack + add-on mods
# ----------------------------------------------------------------------------
# itzg's MODRINTH_MODPACK installer runs on every container start:
#   - Resolves the modpack's latest release on Modrinth
#   - Downloads the .mrpack and extracts server-side mods into /data/mods
#   - Installs Fabric Loader at the version the modpack declares
#   - Leaves client-only mods (MODRINTH_EXCLUDE_FILES) out of the server
#
# MODRINTH_PROJECTS layers extra individual mods on top of the modpack. Keep
# this list to server-side mods that DON'T need a matching client install
# (players don't get a modpack rebuild just because we add one here).
#   bluemap                — live web map on :8100 (mod is server-side only)
#   dcintegration          — DiscordIntegration-Fabric chat+events bridge
#   luckperms              — granular permissions, used to grant /tp etc.
#                            to a "trusted" group without full op. Configure
#                            via RCON: `lp creategroup trusted` then
#                            `lp group trusted permission set minecraft.command.teleport true`,
#                            then `lp user <name> parent add trusted`.
#   fabric-permissions-api — required hook lib that LuckPerms uses to
#                            intercept Brigadier command perm checks
#
# FTB Quests stack is NOT on Modrinth for 1.20.1 Fabric — the FTB team only
# publishes those to CurseForge, and Prominence II's .mrpack marks them
# server:unsupported so itzg's modpack installer skips them. We sideload
# the jars via the MODS env var below (direct CurseForge CDN URLs), which
# itzg downloads into /data/mods on every boot.
#
# Pinned to a specific modpack version so a surprise Modrinth release can't
# drop in a broken mod set mid-session. To bump: pick a new version ID from
# https://modrinth.com/modpack/prominence-2-fabric/versions (the ID after
# the slug in the URL, e.g. `9r2hKvJH` for 3.9.27).
extraEnv:
  MODRINTH_MODPACK: "prominence-2-fabric"
  # Pin to 3.9.27 (released 2026-05-10). Note the env var is
  # MODRINTH_VERSION, not MODRINTH_MODPACK_VERSION — the itzg installer
  # treats them differently and only the former is read here.
  MODRINTH_VERSION: "9r2hKvJH"
  MODRINTH_MODPACK_VERSION_TYPE: "release"
  # Redundant with the modpack's own metadata, but explicit-is-better.
  MODRINTH_LOADER: "fabric"
  # Required for modded MP — vanilla's anti-cheat kicks players when modded
  # items (jetpacks, spellbooks, mid-fall elytra) trigger flight detection.
  # Doesn't grant flight; just disables the kick. Still gated on creative
  # or /fly. Quoted because itzg expects "TRUE"/"FALSE" string env values.
  ALLOW_FLIGHT: "TRUE"
  # Single-line, no spaces — itzg's parser splits naively on comma.
  MODRINTH_PROJECTS: "bluemap,dcintegration,luckperms,fabric-permissions-api"
  # FTB Quests + deps — see comment block above. Versions must match what
  # the client modpack ships; bump in lockstep when the pack updates.
  MODS: >-
    https://mediafilez.forgecdn.net/files/6164/52/ftb-library-fabric-2001.2.9.jar,https://mediafilez.forgecdn.net/files/6130/783/ftb-teams-fabric-2001.3.1.jar,https://mediafilez.forgecdn.net/files/6431/736/ftb-quests-fabric-2001.4.13.jar,https://mediafilez.forgecdn.net/files/6402/485/ftb-xmod-compat-fabric-2.1.3.jar

# ----------------------------------------------------------------------------
# Mod hotfixes (postStart)
# ----------------------------------------------------------------------------
# Some Prominence II mods ship a broken fabric.mod.json that crashes the
# server at preLaunch. We patch them in place after the modpack installer
# drops them but before Fabric starts loading mods. The script is idempotent
# (re-runs are no-ops once the jar is already patched) and exits cleanly if
# the target jar is absent (e.g., the modpack drops the mod or fixes it
# upstream).
#
# Current hotfixes:
#   - ftbxemicompat-no-ambient: declares environment=* but only has client
#     entrypoints; its required client mixin loads on server and NPE's other
#     mods' mixin handlers. Patch sets environment=client so Fabric skips it
#     on server entirely. No functionality lost (the mod bridges client-only
#     EMI with FTB Quests; server has no use for it).
#
# The chart renders `lifecycle.postStart` items via `{{ . }}` and doesn't
# preserve multi-line literals, so the script lives in a ConfigMap mounted
# at /hotfix and is invoked from the postStart handler.
extraDeploy:
  - |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: mc-minecraft-hotfix
      labels:
        app: mc-minecraft
    data:
      run.sh: |
        #!/usr/bin/env bash
        set -euo pipefail
        log() { echo "[hotfix] $*"; }

        patch_env_to_client() {
          local glob="$1" mod_label="$2"
          local deadline=$((SECONDS + 300))
          local jar=""
          while [ -z "$jar" ] && [ "$SECONDS" -lt "$deadline" ]; do
            jar=$(ls $glob 2>/dev/null | head -1 || true)
            [ -z "$jar" ] && sleep 2
          done
          if [ -z "$jar" ]; then
            log "$mod_label: no matching jar after 5min — skipping"
            return 0
          fi
          local env
          env=$(unzip -p "$jar" fabric.mod.json | jq -r '.environment // "*"')
          if [ "$env" = "client" ]; then
            log "$mod_label: $jar already environment=client"
            return 0
          fi
          log "$mod_label: patching $jar (environment '$env' -> client)"
          local work
          work=$(mktemp -d)
          ( cd "$work" && unzip -q "$jar" \
              && jq '.environment = "client"' fabric.mod.json > fabric.mod.json.new \
              && mv fabric.mod.json.new fabric.mod.json \
              && python3 -c "import os, sys, zipfile
        with zipfile.ZipFile(sys.argv[1], 'w', zipfile.ZIP_DEFLATED) as z:
            for root, _, files in os.walk('.'):
                for f in files:
                    p = os.path.join(root, f)
                    z.write(p, os.path.relpath(p, '.'))
        " "$jar.new" )
          mv "$jar.new" "$jar"
          rm -rf "$work"
          log "$mod_label: patched $jar"
        }

        patch_env_to_client "/data/mods/ftbxemicompat-no-ambient-*.jar" "ftbxemicompat-no-ambient"

extraVolumes:
  - volumes:
      - name: hotfix
        configMap:
          name: mc-minecraft-hotfix
          defaultMode: 0755
    volumeMounts:
      - name: hotfix
        mountPath: /hotfix
        readOnly: true

lifecycle:
  postStart:
    - /bin/bash
    - /hotfix/run.sh

# ----------------------------------------------------------------------------
# Health probes
# ----------------------------------------------------------------------------
# Prominence II takes 4-6min to load ~400 mods before it binds 25565. The
# chart's default liveness probe starts pinging at 30s with a 130s total
# budget — which kills the pod before Fabric ever finishes boot, creating a
# restart loop. Enable the startup probe to give Fabric up to ~12min before
# liveness kicks in; once startup succeeds, liveness/readiness use defaults.
startupProbe:
  enabled: true
  failureThreshold: 60        # 60 * periodSeconds = 600s after initial delay
  periodSeconds: 10
  initialDelaySeconds: 120    # Fabric hasn't even started mod init by now

# ----------------------------------------------------------------------------
# Resources
# ----------------------------------------------------------------------------
# 6G heap + ~4G off-heap headroom. Prominence II's off-heap (Metaspace, direct
# buffers, mod native libs, mc-backup sidecar) runs ~1.6G idle — an 8Gi limit
# had the pod at ~95% before a single player joined, one worldgen spike away
# from OOMKill. 10Gi gives ~2.4G of headroom on top of observed idle.
resources:
  requests:
    memory: 5Gi
    cpu: 1000m
  limits:
    memory: 10Gi
    cpu: 4000m

# ----------------------------------------------------------------------------
# Persistent storage
# ----------------------------------------------------------------------------
# Modpacks eat more disk than plugins — /data/mods alone is ~1GB, and worlds
# generate bigger region files. 30Gi still has headroom for Hasturian Era.
persistence:
  dataDir:
    enabled: true
    Size: 30Gi
    # storageClass: ""  # unset = cluster default

# ----------------------------------------------------------------------------
# Backups via itzg/mc-backup sidecar
# ----------------------------------------------------------------------------
# The sidecar runs `save-off` → `save-all flush` → tar → `save-on` via RCON,
# which is the only way to get a consistent backup of a running world.
mcbackup:
  enabled: true
  image:
    repository: itzg/mc-backup
    tag: latest
  pullPolicy: IfNotPresent

  # Hourly backups; prune anything older than 2 days locally.
  # Pair this with offsite (rclone) for longer retention.
  backupInterval: "1h"
  pruneBackupsDays: 2
  initialDelay: "5m"

  # tar  = local tar.gz files on a PVC
  # rclone = push to S3/B2/R2/GCS/etc. (set envs below)
  backupMethod: tar

  # Graceful shutdown hooks — ensures backup runs before pod termination.
  pauseIfNoPlayers: "true"
  playersOnlineCheckInterval: "5m"

  persistence:
    backupDir:
      enabled: true
      Size: 50Gi

  # Local backups die with the PVC. For offsite, switch backupMethod to "rclone"
  # and mount a secret with rclone.conf. See itzg/mc-backup README for envs.

# ----------------------------------------------------------------------------
# Scheduling & reliability
# ----------------------------------------------------------------------------
# Prevent the cluster autoscaler from evicting the pod to consolidate nodes.
# A restart drops every player; worth pinning.
podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

# Pin to zachd-ubuntu — most RAM headroom. Node carries a control-plane
# NoSchedule taint to keep talaria workloads off, so an explicit toleration
# is required here.
nodeSelector:
  kubernetes.io/hostname: zachd-ubuntu

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
