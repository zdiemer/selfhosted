{{/*
Bridge-owned secret holding only the GitHub PAT. Claude Code OAuth
credentials are hostPath-mounted from the node directly into the pod (see
the deployment), not stored as a k8s Secret. The RCON password lives in
the existing mc-rcon secret and is referenced via valueFrom.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-bridge.fullname" . }}
  labels:
    {{- include "claude-bridge.labels" . | nindent 4 }}
type: Opaque
stringData:
  github-token: {{ .Values.secrets.githubToken | quote }}
