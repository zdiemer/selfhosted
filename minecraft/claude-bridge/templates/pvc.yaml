apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "claude-bridge.fullname" . }}-state
  labels:
    {{- include "claude-bridge.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
