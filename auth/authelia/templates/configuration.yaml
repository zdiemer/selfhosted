{{/*
Authelia's main configuration.yml. Rendered as a Secret (not a ConfigMap)
because the OIDC client list it references can include hashed client
secrets and other sensitive material.

All app-level secret *values* (jwt, session, storage key, SMTP password,
OIDC HMAC, OIDC JWKS key) come in via `*_FILE` env vars on the deployment
that point at /secrets/<name>. Authelia 4.38 removed the `*_file:` form
from config-file keys, so the file references live exclusively in env
vars now. The config file itself is value-only.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "authelia.fullname" . }}-config
  labels:
    {{- include "authelia.labels" . | nindent 4 }}
type: Opaque
stringData:
  configuration.yml: |
    theme: dark

    server:
      address: "tcp://0.0.0.0:9091/"

    log:
      level: info

    totp:
      issuer: {{ .Values.sessionDomain | quote }}
      period: 30
      skew: 1

    authentication_backend:
      file:
        path: /config/users_database.yml
        password:
          algorithm: argon2
          argon2:
            variant: argon2id

    access_control:
      default_policy: {{ .Values.accessControl.default_policy | quote }}
      rules:
        {{- toYaml .Values.accessControl.rules | nindent 8 }}

    session:
      cookies:
        - name: authelia_session
          domain: {{ .Values.sessionDomain | quote }}
          authelia_url: {{ .Values.externalUrl | quote }}
          same_site: lax
          expiration: 1h
          inactivity: 15m
          remember_me: 1M

    regulation:
      max_retries: 3
      find_time: 2m
      ban_time: 5m

    storage:
      local:
        path: /data/db.sqlite3

    notifier:
      smtp:
        address: "submission://{{ .Values.secrets.smtp.host }}:{{ .Values.secrets.smtp.port }}"
        username: {{ .Values.secrets.smtp.username | quote }}
        sender: {{ .Values.secrets.smtp.sender | quote }}

    {{- if and .Values.oidc.enabled (gt (len .Values.oidc.clients) 0) }}
    identity_providers:
      oidc:
        jwks:
          - key_id: default
            algorithm: RS256
            use: sig
        clients:
          {{- toYaml .Values.oidc.clients | nindent 10 }}
    {{- end }}
