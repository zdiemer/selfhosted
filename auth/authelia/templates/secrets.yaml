{{/*
Per-file Secret mounted at /secrets. Authelia's config references these by
path (jwt_secret_file, password_file, etc.) rather than env var, which keeps
them out of `kubectl describe pod` and out of env dumps.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "authelia.fullname" . }}-secrets
  labels:
    {{- include "authelia.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt_secret: {{ required "secrets.jwtSecret required" .Values.secrets.jwtSecret | quote }}
  session_secret: {{ required "secrets.sessionSecret required" .Values.secrets.sessionSecret | quote }}
  storage_encryption_key: {{ required "secrets.storageEncryptionKey required" .Values.secrets.storageEncryptionKey | quote }}
  smtp_password: {{ required "secrets.smtp.password required" .Values.secrets.smtp.password | quote }}
  {{- if and .Values.oidc.enabled (gt (len .Values.oidc.clients) 0) }}
  oidc_hmac: {{ required "oidc.hmacSecret required when an OIDC client is registered" .Values.oidc.hmacSecret | quote }}
  oidc_issuer_key: |
{{ required "oidc.issuerPrivateKey required when an OIDC client is registered" .Values.oidc.issuerPrivateKey | indent 4 }}
  {{- end }}
