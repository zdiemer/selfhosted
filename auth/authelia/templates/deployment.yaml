apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "authelia.fullname" . }}
  labels:
    {{- include "authelia.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate         # SQLite + single RWO PVC → never two pods at once
  selector:
    matchLabels:
      {{- include "authelia.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configuration.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        checksum/users: {{ include (print $.Template.BasePath "/users.yaml") . | sha256sum }}
      labels:
        {{- include "authelia.selectorLabels" . | nindent 8 }}
    spec:
      # K8s auto-injects env vars like AUTHELIA_SERVICE_PORT for every Service
      # in the namespace. Authelia interprets `AUTHELIA_*` as configuration
      # overrides, so those injected vars collide with `server.address` and
      # crash the binary. Disable the legacy service-link injection.
      enableServiceLinks: false
      containers:
        - name: authelia
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # No `args:` override — the image's default CMD is `authelia`, which
          # picks up /config/configuration.yml from the mounted Secret. Setting
          # `args` without `command` replaces CMD entirely, so the entrypoint
          # ends up `exec`-ing the literal "--config=..." string and dies with
          # "illegal option --".
          ports:
            - name: http
              containerPort: 9091
          env:
            # Authelia 4.38 removed the `*_file:` config-key form. Secret
            # values now come in via `*_FILE` env vars that point at files
            # mounted from the secrets Secret at /secrets/.
            - name: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE
              value: /secrets/jwt_secret
            - name: AUTHELIA_SESSION_SECRET_FILE
              value: /secrets/session_secret
            - name: AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE
              value: /secrets/storage_encryption_key
            - name: AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE
              value: /secrets/smtp_password
            {{- if and .Values.oidc.enabled (gt (len .Values.oidc.clients) 0) }}
            - name: AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET_FILE
              value: /secrets/oidc_hmac
            - name: AUTHELIA_IDENTITY_PROVIDERS_OIDC_JWKS_0_KEY_FILE
              value: /secrets/oidc_issuer_key
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config/configuration.yml
              subPath: configuration.yml
              readOnly: true
            - name: users
              mountPath: /config/users_database.yml
              subPath: users_database.yml
              readOnly: true
            - name: secrets
              mountPath: /secrets
              readOnly: true
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          secret:
            secretName: {{ include "authelia.fullname" . }}-config
        - name: users
          secret:
            secretName: {{ include "authelia.fullname" . }}-users
        - name: secrets
          secret:
            secretName: {{ include "authelia.fullname" . }}-secrets
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "authelia.fullname" . }}-data
