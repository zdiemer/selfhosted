{{- $ctx := merge (dict "componentName" "bot") . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vocard.fullname" $ctx }}
  labels:
    {{- include "vocard.labels" $ctx | nindent 4 }}
spec:
  # Single instance — Vocard's state is held in MongoDB + Discord gateway
  # sessions; two bots on the same token would fight.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "vocard.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vocard.labels" $ctx | nindent 8 }}
      annotations:
        # Re-roll the pod when settings.json contents change (token rotation,
        # prefix change, etc.). Secret mounts auto-refresh but the bot only
        # reads settings.json at startup.
        checksum/settings: {{ include (print $.Template.BasePath "/vocard-settings.yaml") . | sha256sum }}
    spec:
      # Init container does two things:
      #   1. Vocard rewrites settings.json on startup (updates the version
      #      field), so it can't be mounted directly from the Secret
      #      (read-only). Copy it into a writable emptyDir.
      #   2. Vocard does NOT retry the Lavalink node connection at startup —
      #      if Lavalink isn't reachable when the bot boots, it stays online
      #      but every /play fails until the bot is restarted manually. So
      #      block here until Lavalink's TCP port answers. Mongo gets the
      #      same treatment to avoid the bot crashing on a cold cluster boot
      #      where DNS for the Mongo Service hasn't published yet.
      initContainers:
        - name: init-settings
          image: "{{ .Values.images.bot.repository }}:{{ .Values.images.bot.tag }}"
          imagePullPolicy: {{ .Values.images.bot.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -eu
              cp /src/settings.json /dst/settings.json
              wait_for() {
                host=$1; port=$2
                until python -c "import socket,sys; socket.create_connection(('$host',$port),timeout=2)" 2>/dev/null; do
                  echo "waiting for $host:$port..."
                  sleep 2
                done
                echo "$host:$port is up"
              }
              wait_for {{ printf "%s-mongo" .Release.Name }} 27017
              wait_for {{ printf "%s-lavalink" .Release.Name }} 2333
          volumeMounts:
            - name: settings-src
              mountPath: /src
              readOnly: true
            - name: settings
              mountPath: /dst
      containers:
        - name: vocard
          image: "{{ .Values.images.bot.repository }}:{{ .Values.images.bot.tag }}"
          imagePullPolicy: {{ .Values.images.bot.pullPolicy }}
          # No inbound ports — the bot is a Discord gateway client (outbound
          # WebSocket to gateway.discord.gg).
          volumeMounts:
            - name: settings
              mountPath: /app/settings.json
              subPath: settings.json
          resources:
            {{- toYaml .Values.bot.resources | nindent 12 }}
      volumes:
        - name: settings-src
          secret:
            secretName: {{ .Release.Name }}-bot-settings
            items:
              - key: settings.json
                path: settings.json
        - name: settings
          emptyDir: {}
