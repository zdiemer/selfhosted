{{- $ctx := merge (dict "componentName" "bot") . -}}
{{- $mongoHost := printf "%s-mongo" .Release.Name -}}
{{- $lavalinkHost := printf "%s-lavalink" .Release.Name -}}
{{- $mongoPw := required "secrets.mongoRootPassword is required" .Values.secrets.mongoRootPassword -}}
{{- $lavalinkPw := required "secrets.lavalinkPassword is required" .Values.secrets.lavalinkPassword -}}
{{- $token := required "secrets.discordToken is required" .Values.secrets.discordToken | toString -}}
{{- /* Force client_id to string — Discord snowflakes are 18-19 digits and YAML would otherwise parse as int, which some libs reject. */ -}}
{{- $clientId := required "secrets.discordClientId is required" .Values.secrets.discordClientId | toString -}}
{{- $mongoUrl := printf "mongodb://admin:%s@%s:27017/vocard?authSource=admin" $mongoPw $mongoHost -}}
{{- /* The @@t_...@@ label placeholders under default_controller are Vocard
       lang-file keys; v2.7.3 namespaced them (t_buttonBack ->
       t_player.buttons.back). Unresolvable keys render as the literal label
       "Not found!". Cross-check against `langs/EN.json` in the image on
       every Vocard version bump. */ -}}
{{- $settings := dict
  "token" $token
  "client_id" $clientId
  "genius_token" .Values.secrets.geniusToken
  "mongodb_url" $mongoUrl
  "mongodb_name" "vocard"
  "nodes" (dict "DEFAULT" (dict
    "host" $lavalinkHost
    "port" 2333
    "password" $lavalinkPw
    "secure" false
    "identifier" "DEFAULT"
    "yt_ratelimit" (dict
      "tokens" list
      "config" (dict "retry_time" 10800 "max_requests" 30)
      "strategy" "LoadBalance")))
  "prefix" .Values.settings.prefix
  "activity" .Values.settings.activity
  "logging" (dict
    "file" (dict "path" "./logs" "enable" true)
    "level" (dict "discord" "INFO" "vocard" "INFO" "ipc_client" "INFO")
    "max-history" 30)
  "bot_access_user" list
  "embed_color" .Values.settings.embedColor
  "default_max_queue" (int .Values.settings.defaultMaxQueue)
  "lyrics_platform" .Values.settings.lyricsPlatform
  "ipc_client" (dict
    "host" "127.0.0.1"
    "port" 8000
    "password" ""
    "secure" false
    "enable" .Values.dashboard.enabled)
  "aliases" .Values.settings.aliases
  "cooldowns" .Values.settings.cooldowns
  "sources_settings" (dict
    "youtube"      (dict "emoji" "▶️" "color" "0xFF0000")
    "youtubemusic" (dict "emoji" "▶️" "color" "0xFF0000")
    "spotify"      (dict "emoji" "🟢" "color" "0x1DB954")
    "soundcloud"   (dict "emoji" "🟧" "color" "0xFF7700")
    "twitch"       (dict "emoji" "🟣" "color" "0x9000FF")
    "bandcamp"     (dict "emoji" "🎵" "color" "0x6F98A7")
    "vimeo"        (dict "emoji" "🎬" "color" "0x1ABCEA")
    "applemusic"   (dict "emoji" "🍎" "color" "0xE298C4")
    "reddit"       (dict "emoji" "🟠" "color" "0xFF4500")
    "tiktok"       (dict "emoji" "🎶" "color" "0x74ECE9")
    "others"       (dict "emoji" "🔗" "color" "0xb3b3b3"))
  "default_voice_status_template" "{{@@track_name@@ != 'None' ?? @@track_source_emoji@@ Now Playing: @@track_name@@ // Waiting for song requests}}"
  "default_controller" (dict
    "embeds" (dict
      "active" (dict
        "description" "**Now Playing: ```[@@track_name@@]```\nLink: [Click Me](@@track_url@@) | Requester: @@track_requester_mention@@ | DJ: @@dj@@**"
        "footer" (dict "text" "Queue Length: @@queue_length@@ | Duration: @@track_duration@@ | Volume: @@volume@@% {{loop_mode != 'Off' ?? | Repeat: @@loop_mode@@}}")
        "image" "@@track_thumbnail@@"
        "author" (dict "name" "Music Controller | @@channel_name@@" "icon_url" "@@bot_icon@@")
        "color" "@@track_color@@")
      "inactive" (dict
        "title" (dict "name" "There are no songs playing right now")
        "description" "Queue something with `/play`."
        "color" "@@default_embed_color@@"))
    "buttons" (list
      (dict
        "back"       (dict "emoji" "⏮️" "label" "@@t_player.buttons.back@@")
        "play-pause" (dict "states" (dict
          "pause"  (dict "emoji" "⏸️" "label" "@@t_player.buttons.pause@@")
          "resume" (dict "emoji" "▶️" "label" "@@t_player.buttons.resume@@")))
        "skip"       (dict "emoji" "⏭️" "label" "@@t_player.buttons.skip@@")
        "stop"       (dict "emoji" "⏹️" "label" "@@t_player.buttons.leave@@" "style" "red")
        "add-fav"    (dict "emoji" "❤️" "label" ""))
      (dict
        "tracks"     (dict "label" "@@t_player.dropdown.trackSelect@@" "max_options" 10))))
-}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-bot-settings
  labels:
    {{- include "vocard.labels" $ctx | nindent 4 }}
type: Opaque
stringData:
  # Lavalink reads this via LAVALINK_SERVER_PASSWORD env var (see deployment).
  # Bot reads it indirectly via the nodes.DEFAULT.password field in settings.json.
  lavalink-password: {{ $lavalinkPw | quote }}
  settings.json: |
    {{- $settings | toPrettyJson | nindent 4 }}
