{{- $ctx := merge (dict "componentName" "lavalink") . -}}
{{- $tokenerHost := printf "%s-spotify-tokener" .Release.Name -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vocard.fullname" $ctx }}
  labels:
    {{- include "vocard.labels" $ctx | nindent 4 }}
data:
  # Lavalink does Spring-style env var substitution — ${LAVALINK_SERVER_PASSWORD}
  # is injected from the secret at startup, so the password never sits in this
  # ConfigMap. Everything else is non-sensitive config.
  application.yml: |
    server:
      port: 2333
      address: 0.0.0.0
      http2:
        enabled: true

    plugins:
      youtube:
        enabled: true
        allowSearch: true
        allowDirectVideoIds: true
        allowDirectPlaylistIds: true
        clients:
          - MUSIC
          - ANDROID_VR
          - ANDROID_MUSIC
          - WEB
          - WEBEMBEDDED
          - TVHTML5EMBEDDED
        clientOptions:
          WEB:
            playback: false
            videoLoading: false
          WEBEMBEDDED:
            playlistLoading: false
            searching: false

      lavasrc:
        providers:
          - "ytsearch:\"%ISRC%\""
          - "ytsearch:%QUERY%"
        sources:
          spotify: {{ .Values.spotifyTokener.enabled }}
          applemusic: false
          deezer: false
          yandexmusic: false
          flowerytts: false
          youtube: false
          vkmusic: false
        lyrics-sources:
          spotify: false
          deezer: false
          youtube: false
          yandexmusic: false
          vkmusic: false
        {{- if .Values.spotifyTokener.enabled }}
        spotify:
          clientId: ""
          clientSecret: ""
          countryCode: "US"
          playlistLoadLimit: 6
          albumLoadLimit: 6
          resolveArtistsInSearch: true
          localFiles: false
          preferAnonymousToken: true
          customTokenEndpoint: "http://{{ $tokenerHost }}:49152/api/token"
        {{- end }}

    lavalink:
      plugins:
        - dependency: "dev.lavalink.youtube:youtube-plugin:{{ .Values.lavalink.plugins.youtube }}"
          snapshot: false
        - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:{{ .Values.lavalink.plugins.lavasrc }}"
          snapshot: false
      server:
        password: "${LAVALINK_SERVER_PASSWORD}"
        sources:
          youtube: false
          bandcamp: true
          soundcloud: true
          twitch: true
          vimeo: true
          nico: true
          http: true
          local: false
        filters:
          volume: true
          equalizer: true
          karaoke: true
          timescale: true
          tremolo: true
          vibrato: true
          distortion: true
          rotation: true
          channelMix: true
          lowPass: true
        bufferDurationMs: 400
        frameBufferDurationMs: 5000
        opusEncodingQuality: 10
        resamplingQuality: LOW
        trackStuckThresholdMs: 10000
        useSeekGhosting: true
        youtubePlaylistLoadLimit: 6
        playerUpdateInterval: 5
        youtubeSearchEnabled: true
        soundcloudSearchEnabled: true
        gc-warnings: true

    metrics:
      prometheus:
        enabled: false
        endpoint: /metrics

    logging:
      file:
        path: ./logs/
      level:
        root: INFO
        lavalink: INFO
      request:
        enabled: true
        includeClientInfo: true
        includeHeaders: false
        includeQueryString: true
        includePayload: true
        maxPayloadLength: 10000
      logback:
        rollingpolicy:
          max-file-size: 1GB
          max-history: 30
