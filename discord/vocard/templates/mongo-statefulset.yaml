{{- $ctx := merge (dict "componentName" "mongo") . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vocard.fullname" $ctx }}
  labels:
    {{- include "vocard.labels" $ctx | nindent 4 }}
spec:
  serviceName: {{ include "vocard.fullname" $ctx }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "vocard.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vocard.labels" $ctx | nindent 8 }}
    spec:
      containers:
        - name: mongo
          image: "{{ .Values.images.mongo.repository }}:{{ .Values.images.mongo.tag }}"
          imagePullPolicy: {{ .Values.images.mongo.pullPolicy }}
          ports:
            - name: mongo
              containerPort: 27017
              protocol: TCP
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "vocard.fullname" $ctx }}
                  key: mongo-root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vocard.fullname" $ctx }}
                  key: mongo-root-password
          volumeMounts:
            - name: data
              mountPath: /data/db
          resources:
            {{- toYaml .Values.mongo.resources | nindent 12 }}
          # mongosh has a slow Node.js cold-start (~2-3s under load), so the
          # default 1s exec-probe timeout flaps the pod's Ready state and
          # starves dependents. Give it 10s, and tolerate a few transient
          # misses before declaring failure.
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.mongo.storage.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mongo.storage.size }}
