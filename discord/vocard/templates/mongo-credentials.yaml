{{- $ctx := merge (dict "componentName" "mongo") . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vocard.fullname" $ctx }}
  labels:
    {{- include "vocard.labels" $ctx | nindent 4 }}
type: Opaque
stringData:
  mongo-root-username: admin
  mongo-root-password: {{ required "secrets.mongoRootPassword is required — see values.local.yaml.example" .Values.secrets.mongoRootPassword | quote }}
