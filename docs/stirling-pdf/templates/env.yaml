{{/*
Rendered env for the Stirling container. A Secret (not a ConfigMap) so the
OAuth2 client secret / initial login password never show up in
`kubectl describe pod`. The Deployment checksums this to restart on change.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stirling.fullname" . }}-env
  labels:
    {{- include "stirling.labels" . | nindent 4 }}
type: Opaque
stringData:
  UI_APPNAME: {{ .Values.stirling.appName | quote }}
  SYSTEM_DEFAULTLOCALE: {{ .Values.stirling.defaultLocale | quote }}
  SYSTEM_ENABLEANALYTICS: {{ .Values.stirling.enableAnalytics | quote }}
  SECURITY_ENABLELOGIN: {{ include "stirling.loginEnabled" . | quote }}
  {{- if and .Values.stirling.login.enabled (not .Values.stirling.oauth2.enabled) }}
  {{- with .Values.stirling.login.initialUsername }}
  SECURITY_INITIALLOGIN_USERNAME: {{ . | quote }}
  {{- end }}
  {{- with .Values.stirling.login.initialPassword }}
  SECURITY_INITIALLOGIN_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.stirling.oauth2.enabled }}
  SECURITY_OAUTH2_ENABLED: "true"
  SECURITY_OAUTH2_PROVIDER: {{ .Values.stirling.oauth2.provider | quote }}
  SECURITY_OAUTH2_ISSUER: {{ required "stirling.oauth2.issuer is required when oauth2.enabled" .Values.stirling.oauth2.issuer | quote }}
  SECURITY_OAUTH2_CLIENTID: {{ .Values.stirling.oauth2.clientId | quote }}
  SECURITY_OAUTH2_CLIENTSECRET: {{ required "stirling.oauth2.clientSecret is required when oauth2.enabled (set in values.local.yaml)" .Values.stirling.oauth2.clientSecret | quote }}
  SECURITY_OAUTH2_SCOPES: {{ .Values.stirling.oauth2.scopes | quote }}
  SECURITY_OAUTH2_USEASUSERNAME: {{ .Values.stirling.oauth2.useAsUsername | quote }}
  SECURITY_OAUTH2_AUTOCREATEUSER: {{ .Values.stirling.oauth2.autoCreateUser | quote }}
  {{- end }}
  {{- range $k, $v := .Values.stirling.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
