apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "romm.fullname" . }}
  labels:
    {{- include "romm.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Recreate because we share a single RWO data PVC; never two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "romm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Restart pod when rendered env Secret changes (e.g. new scraper key).
        checksum/env: {{ include (print $.Template.BasePath "/romm-env.yaml") . | sha256sum }}
      labels:
        {{- include "romm.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: romm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: {{ include "romm.fullname" . }}-env
          volumeMounts:
            - name: library
              mountPath: {{ .Values.smb.mountPath }}
              {{- with .Values.smb.sharePath }}
              subPath: {{ . }}
              {{- end }}
              readOnly: true
            - name: data
              mountPath: /romm/resources
              subPath: resources
            - name: data
              mountPath: /romm/assets
              subPath: assets
            - name: data
              mountPath: /romm/config
              subPath: config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: library
          persistentVolumeClaim:
            claimName: {{ include "romm.fullname" . }}-library
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "romm.fullname" . }}-data
