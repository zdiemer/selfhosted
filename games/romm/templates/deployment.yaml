apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "romm.fullname" . }}
  labels:
    {{- include "romm.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Recreate because we share a single RWO data PVC; never two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "romm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Restart pod when rendered env Secret changes (e.g. new scraper key).
        checksum/env: {{ include (print $.Template.BasePath "/romm-env.yaml") . | sha256sum }}
        checksum/config: {{ include (print $.Template.BasePath "/config.yaml") . | sha256sum }}
      labels:
        {{- include "romm.selectorLabels" . | nindent 8 }}
    spec:
      # Kubernetes injects legacy service-discovery env vars for every Service in
      # the namespace: our Service is called "romm", so the pod was handed
      # ROMM_PORT=tcp://10.43.x.x:8080. RomM reads ROMM_PORT as the port nginx
      # should listen on, got a URL, and crash-looped on
      #   [emerg] invalid host in "tcp://10.43.214.72:8080" of the "listen" directive
      # Nothing needs those vars — we address the DB by DNS.
      enableServiceLinks: false
      # RomM crashes rather than retries if the database isn't up yet.
      initContainers:
        - name: wait-for-db
          image: "{{ .Values.db.image }}"
          command:
            - sh
            - -c
            - |
              # --skip-ssl: MariaDB 11.4 serves TLS with a self-signed cert by
              # default and the client verifies it, so a plain ping fails with
              # "TLS/SSL error: self-signed certificate" even though the server is
              # healthy. We only want to know it's accepting connections.
              until mariadb-admin ping -h "{{ include "romm.fullname" . }}-db" --silent --skip-ssl; do
                echo "waiting for mariadb..."; sleep 3
              done
              echo "mariadb is up"
        - name: build-library
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["python3", "/builder/build.py"]
          volumeMounts:
            - name: nas
              mountPath: /nas
              readOnly: true
            - name: library
              mountPath: /romm/library
            - name: config
              mountPath: /romm/config/config.yml
              subPath: config.yml
              readOnly: true
            - name: builder
              mountPath: /builder
              readOnly: true
      containers:
        - name: romm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: {{ include "romm.fullname" . }}-env
          volumeMounts:
            # The symlink tree. Its targets live under /nas, so the share has to be
            # visible in this container too or every link would dangle.
            - name: library
              mountPath: /romm/library
            - name: nas
              mountPath: /nas
              readOnly: true
            - name: data
              mountPath: /romm/resources
              subPath: resources
            - name: data
              mountPath: /romm/assets
              subPath: assets
            # RomM keeps its background-task queue in an in-image Redis. Without a
            # volume here the queue is lost on every restart.
            - name: data
              mountPath: /redis-data
              subPath: redis
            - name: config
              mountPath: /romm/config/config.yml
              subPath: config.yml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: nas
          persistentVolumeClaim:
            claimName: {{ include "romm.fullname" . }}-library
        # Rebuilt on every start. It's only symlinks — cheap to make, and it can
        # never drift from the share.
        - name: library
          emptyDir: {}
        - name: builder
          configMap:
            name: {{ include "romm.fullname" . }}-library-builder
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "romm.fullname" . }}-data
        - name: config
          configMap:
            name: {{ include "romm.fullname" . }}-config
