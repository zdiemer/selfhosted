{{/*
The library RomM sees is a tree of SYMLINKS into the read-only share.

Why: RomM does not recurse. get_roms() lists files and directories at exactly one
level, and every directory it finds becomes ONE multi-file game. That is correct
for multi-disc games (BrainDead 13 (USA)/ -> one game, several discs), but it means
a folder like 3DO/_hacks/ — 24 standalone fan-translations — would collapse into a
single bogus "game" called _hacks with 24 "discs", with no metadata and no cover.

The NAS layout is deliberate and we do not touch it. Instead the share is mounted
read-only at /nas, and this init container builds /romm/library as symlinks:

    /romm/library/Roms/3DO/BrainDead 13 (USA)  -> /nas/Roms/3DO/BrainDead 13 (USA)
    /romm/library/Roms/3DO/Doctor Hauzer...chd -> /nas/Roms/3DO/_hacks/Doctor Hauzer...chd
                                                                      ^^^^^^ lifted to top level

So the nested games become real, individually-matched games, and the share is
unchanged. Python's scandir/is_dir/open all follow symlinks, so scanning, hashing
and playing work straight through them.

Only the platforms RomM will actually scan are built — walking J2ME's 223,430
entries to link files we then exclude would be absurd.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "romm.fullname" . }}-library-builder
  labels:
    {{- include "romm.labels" . | nindent 4 }}
data:
  build.py: |
    import os, sys, yaml, time

    # The share lives under the library root (see the deployment): RomM resolves
    # real files and rejects anything outside base_path, so symlinks must point
    # to targets INSIDE /romm/library.
    SRC = "/romm/library/.nas/{{ .Values.config.romsFolder }}"
    DST = "/romm/library/{{ .Values.config.romsFolder }}"
    cfg = yaml.safe_load(open("/romm/config/config.yml"))
    wanted  = set((cfg.get("system") or {}).get("platforms") or {})
    excluded = set((cfg.get("exclude") or {}).get("platforms") or [])
    FLATTEN = set({{ .Values.config.flattenFolders | toJson }})
    SKIP    = set({{ .Values.config.skipFolders | toJson }})
    KEEP    = {"{{ .Values.config.firmwareFolder }}"}

    # RomM looks for firmware at <library>/<firmware_folder>/<platform> — NOT at
    # <platform>/<firmware_folder>. (config has_structure_path_b is False for a
    # roms-at-root layout, so get_firmware_fs_structure returns "_bios/3DO".) The
    # share has it the other way round, at Roms/3DO/_bios, so link it across.
    # It must ALSO be kept out of the platform folder, or RomM reads it as a
    # multi-file game called "_bios".
    FW = "/romm/library/{{ .Values.config.firmwareFolder }}"

    t0 = time.time()
    os.makedirs(DST, exist_ok=True)
    os.makedirs(FW, exist_ok=True)
    links = flat = fw = 0
    for plat in sorted(os.listdir(SRC)):
        if plat in excluded or plat not in wanted:
            continue
        src = os.path.join(SRC, plat)
        if not os.path.isdir(src):
            continue
        dst = os.path.join(DST, plat)
        os.makedirs(dst, exist_ok=True)
        bios = os.path.join(src, "{{ .Values.config.firmwareFolder }}")
        if os.path.isdir(bios):
            link = os.path.join(FW, plat)
            bfiles = sorted(f for f in os.listdir(bios)
                            if os.path.isfile(os.path.join(bios, f)))
            # RomM bug #1835: a platform with EXACTLY ONE firmware file shows no
            # dropdown AND won't auto-load it — even when verified — so the BIOS
            # never reaches EmulatorJS and cores that require it (Lynx/handy,
            # ColecoVision, Atari 5200, PC-FX, FDS) just fail to boot. The share
            # has one file each for those. The documented workaround is to give
            # RomM a second firmware entry so the dropdown appears. We can't write
            # into the read-only NAS, so instead of symlinking the whole _bios dir
            # we build a real dir here: the true file under its own name (stays
            # hash-verified and correctly named for EJS) plus a duplicate under a
            # marked name to trip the dropdown. Pick the real one in the player.
            if len(bfiles) == 1 and not os.path.lexists(link):
                os.makedirs(link, exist_ok=True)
                real = bfiles[0]
                os.symlink(os.path.join(bios, real), os.path.join(link, real))
                stem, ext = os.path.splitext(real)
                os.symlink(os.path.join(bios, real),
                           os.path.join(link, f"{stem} (copy){ext}"))
                fw += 1
            elif not os.path.lexists(link):
                os.symlink(bios, link); fw += 1

        for e in os.scandir(src):
            if e.name in SKIP or e.name == "{{ .Values.config.firmwareFolder }}":
                continue
            # Lift the contents of a flatten-folder up to the platform root, so each
            # nested game becomes a game in its own right.
            if e.name in FLATTEN and e.is_dir():
                for sub in os.scandir(e.path):
                    link = os.path.join(dst, sub.name)
                    if not os.path.lexists(link):
                        os.symlink(sub.path, link); flat += 1
                continue
            link = os.path.join(dst, e.name)
            if not os.path.lexists(link):
                os.symlink(e.path, link); links += 1
    print(f"library: {links} entries linked, {flat} lifted out of {sorted(FLATTEN)}, "
          f"{fw} platforms with firmware, across {len(wanted)} platforms "
          f"in {time.time()-t0:.0f}s", flush=True)
