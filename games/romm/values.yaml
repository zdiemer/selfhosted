romm:
  # REQUIRED — set in values.local.yaml. Generate with:
  #   openssl rand -hex 32
  authSecretKey: ""

  # Scanning is MANUAL to begin with: 167 platform folders over SMB is not
  # something to discover the hard way on a schedule. Trigger scans per platform
  # from the UI, then turn these on once we know how it behaves.
  scheduledRescan: false
  rescanOnChange: false
  # RomM's default is 4h. A hashing scan of 8 TB takes ~22h, so the default would
  # kill the job at hour 4 — three quarters of the way through nothing.
  scanTimeout: 172800       # 48h

  # Hash-based identification. Free, no API key. This is the whole reason to pay
  # for hashing: IGDB matches on FILENAME, so it fumbles badly-named dumps,
  # regional variants and aftermarket rips. Hasheous matches on the checksum, so
  # it doesn't care what the file is called.
  hasheous: true

  # Optional scrapers (all set in values.local.yaml).
  igdb:
    clientId: ""
    clientSecret: ""
  screenscraper:
    username: ""
    password: ""
  mobygames:
    apiKey: ""
  steamgriddb:
    apiKey: ""

  # OIDC — follow-up. Leave disabled until DuckDNS + Ingress + IdP are up.
  oidc:
    enabled: false
    serverName: ""          # Display name, e.g. "Authelia"
    issuer: ""              # https://auth.zachd.duckdns.org
    clientId: ""
    clientSecret: ""        # values.local.yaml

ingress:
  # RomM has its own login, so unlike gamedex this isn't open to the world.
  enabled: true
  className: traefik
  host: romm.zachd.duckdns.org
  tls:
    enabled: true
    # DuckDNS can only write TXT at the account's top-level, so sub-subdomain
    # certs must ride a wildcard SAN. See README §DuckDNS follow-up.
    certResolver: duckdns
    domain: zachd.duckdns.org
    wildcardSan: "*.zachd.duckdns.org"

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    # A scan of 167 platforms sat at 990Mi against the old 1Gi limit — it was one
    # big platform away from being OOM-killed mid-scan.
    memory: 3Gi
