image:
  repository: rommapp/romm
  tag: "5.0.0"
  pullPolicy: IfNotPresent

# RomM requires MariaDB. There is no SQLite option: ROMM_DB_DRIVER defaults to
# "mariadb" and the app will not start without a reachable server.
db:
  image: mariadb:11.4
  name: romm
  user: romm
  password: ""              # values.local.yaml
  rootPassword: ""          # values.local.yaml
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 1Gi

service:
  type: ClusterIP
  port: 8080

# SMB share mounted read-only into the container. Point this at the share
# that already serves ROMs to your Steam Deck — we just add a k8s consumer.
smb:
  host: "192.168.4.36"      # the NAS on the LAN
  share: "games"            # //192.168.4.36/games
  vers: "3.0"               # Pin SMB protocol; Windows 10/11 speak 3.x
  # Extra mount options. Read-only perms by default (0555 dirs, 0444 files).
  mountOptions:
    - dir_mode=0555
    - file_mode=0444
    - noserverino
  # Where the share's contents land inside the container. RomM's default
  # layout expects /romm/library/roms/<platform>/<file>. If your share's root
  # *is* the per-platform folders, mount it at /romm/library/roms (default).
  # If your share's root contains roms/ and bios/ already, use /romm/library.
  # The share's root holds Roms/ and Emulators/, so mount the whole thing at
  # /romm/library and tell RomM its roms folder is "Roms" (config.romsFolder).
  # The alternative — mounting Roms/ at /romm/library/roms — would work too, but
  # this way the layout in RomM matches the layout on the NAS.
  mountPath: /romm/library
  sharePath: ""
  # SMB username/password live in values.local.yaml.

# Saves and states. RomM never writes to the library — assets are a separate tree
# (users/<id>/saves/<platform>/<rom_id>/<emulator>/) — so this share is the only
# one mounted read-write, and the games share stays strictly read-only.
#
# Note this does NOT interop with the desktop emulators already in game_data
# (retroarch/, melonds/, rpcs3/...). RomM writes its own layout; it will not read
# or write their save files.
saves:
  enabled: true
  host: "192.168.4.36"
  share: "game_data"
  sharePath: "zach/romm"     # subPath inside the share
  vers: "3.0"
  mountOptions:
    - dir_mode=0775
    - file_mode=0664
    - noserverino
  # Credentials come from smb.username/smb.password (same NAS user).

persistence:
  data:
    # One PVC, subPathed into /romm/resources, /romm/assets and /redis-data.
    # Covers and screenshots for a library this size add up — 20Gi was optimistic.
    size: 50Gi
    storageClass: ""        # "" → cluster default StorageClass
    accessMode: ReadWriteOnce
  db:
    size: 10Gi
    storageClass: ""

# Written to /romm/config/config.yml.
config:
  # The share's platform folders live under Roms/.
  romsFolder: "Roms"
  # BIOS on this share lives at <platform>/_bios (67 platforms have one).
  # RomM defaults to "bios" and so found zero firmware.
  firmwareFolder: "_bios"
  # RomM does not recurse: a sub-folder is always ONE game. That's right for
  # multi-disc games, but wrong for these, which hold standalone games. The init
  # container lifts their contents up to the platform root via symlinks, so each
  # becomes a game in its own right — without touching the NAS layout.
  flattenFolders:
    - _hacks
    - _extracted
    - _dosbox
  # Not games. _psn is unextracted .pkg files; _unused is what it says.
  skipFolders:
    - _psn
    - _unused
  # Hashing reads every ROM in full. The playable set is 8.06 TB over a link that
  # sustains 107 MB/s, so this is a ~22h one-off — deliberately accepted, because
  # hashes are what Hasheous and RetroAchievements identify games BY. They're
  # cached in the DB afterwards, not recomputed on later scans.
  # It is only worth paying if something consumes the hashes: see romm.hasheous.
  skipHashCalculation: false
  # Folders that aren't game platforms, or that we don't want RomM walking.
  excludePlatforms:
    # Everything RomM cannot PLAY IN THE BROWSER. RomM's EmulatorJS build ships a
    # fixed table of 78 platform slugs (frontend bundle, object `mO`); anything
    # outside it has no core, so it is a catalogue entry with no Play button.
    # That rules out Dreamcast, MSX, Vectrex and Atari ST (no flycast/bluemsx/
    # vecx/hatari in the build), every modern console (PS2 up, Xbox, Wii, Switch),
    # the home micros (ZX Spectrum, BBC, Apple II), and the arcade BOARDS whose
    # games MAME 2003 / FBNeo can't run (Naomi, Chihiro, Triforce, Atomiswave,
    # TeknoParrot, Daphne laserdisc). The MAME folder itself stays.
    - J2ME
    - Flashpoint-Flash
    - ZX Spectrum
    - Flashpoint-HTML5
    - Symbian
    - iOS
