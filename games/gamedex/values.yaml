image:
  # Built + pushed to GHCR by build.sh; the package is public so every node
  # pulls it anonymously (the cluster is multi-node, so side-loading doesn't fit).
  repository: ghcr.io/zdiemer/gamedex
  tag: "1.15.4"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

dropbox:
  # REQUIRED — set in values.local.yaml. The shared *folder* link to the
  # directory containing the workbook (…/scl/fo/…?rlkey=…). A direct file link
  # (…/scl/fi/…) also works. See README.
  url: ""
  # Name of the workbook inside the shared folder (ignored for file links).
  filename: "Games Master List - Final.xlsx"

# How often the poller re-checks Dropbox for edits. Only re-parses when the
# file content actually changes, so a short interval is cheap.
refreshIntervalSeconds: 600

# IGDB metadata enrichment. Enabled automatically when clientId/clientSecret are
# set (in values.local.yaml). Enrichment is lazy + host-cached on the PVC below:
# only games you actually browse get matched (respecting IGDB's 4 req/s limit).
igdb:
  clientId: ""            # Twitch app Client ID   (values.local.yaml)
  clientSecret: ""        # Twitch app Client Secret (values.local.yaml)
  # Slowly enrich every game in the background so the IGDB facets + cover map
  # eventually cover the whole library. Runs at 4 req/s behind on-demand
  # requests, cached on the PVC. Also drives the HLTB backfill (1 req/s).
  backfill: true
  # HowLongToBeat playtimes (1 req/s) — feeds the Playtime facet + card, falls
  # back to the sheet's Estimated Time. Uses HLTB's /api/bleed token handshake.
  hltb: true
  # Metacritic critic scores (3 req/s) via the Fandom backend API — feeds the
  # Metacritic facet + card, falls back to the sheet's Metacritic Rating.
  metacritic: true
  # Fallback metadata for games IGDB doesn't match:
  # IGN → GameSpot → Steam(PC) → LaunchBox. LaunchBox goes last: deepest retro
  # catalogue, but a page fetch per candidate, so it's the slowest of the four.
  fallback: true
  # GameEye market values (Loose/CIB/New) for owned physical games only, 500/hr.
  gameye: true
  # How often to RE-scrape those prices. A cached price is a stale price, so the
  # collection-value trend needs fresh ones — but at 500/hr a full pass over the
  # ~2k owned physical games takes ~4h, which is fine weekly and wasteful daily.
  # (The value snapshot itself runs daily regardless, so buying or selling a game
  # shows up the next day even between scrapes.)
  valueRescrapeDays: 7
  # Arcade Database (4 req/s) — an EXACT lookup by MAME romset, so it cannot
  # mismatch. Cabinet/marquee/flyer art, player count, controls, orientation.
  # Gated to the games that carry a romset.
  arcadedb: true
  # VNDB (1 req/s) — community rating, vote count and median length for visual
  # novels. Gated to the Visual Novel + Adventure genres.
  vndb: true
  # TinyCircuits' own game lists — the only metadata that exists for these.
  # Gated to the Thumby / Thumby Color platforms.
  thumby: true
  # VGChartz (1 req/s) — unit sales, scraped from the sales table. Estimates,
  # and coverage skews hard to major retail releases; most games have no entry.
  vgchartz: true
  # Steam-appid extras (1 req/s, 4 calls per game): Valve's Deck compatibility,
  # ProtonDB's community tier, SteamSpy owners/reviews, and global achievement
  # rates. Keyed on the appid IGDB gives us, so it cannot mismatch.
  steamx: true
  # speedrun.com world records (1 req/s) — the counterweight to HowLongToBeat.
  speedrun: true
  # StrategyWiki walkthrough links (2 req/s). GameFAQs is Cloudflare-blocked.
  guides: true
  # Co-Optimus: local/online player counts, splitscreen, campaign co-op.
  cooptimus: true

# GameSpot for the fallback chain (apiKey goes in values.local.yaml).
# DISABLED: the API now 301s to a Cloudflare-protected page (403 "Just a
# moment…"), so it matched 0 games — and at 200 req/hr it stalled the chain
# ~18s per IGDB miss. The chain is IGN → Steam. Flip enabled if it ever returns.
gamespot:
  apiKey: ""
  enabled: false

# PVC holding the SQLite IGDB cache — the only persistent state. Small.
persistence:
  size: 1Gi
  storageClass: ""        # "" → cluster default (local-path)
  accessMode: ReadWriteOnce

ingress:
  enabled: true
  className: traefik
  host: games.zachd.duckdns.org
  tls:
    enabled: true
    # DuckDNS can only write TXT at the account top-level, so sub-subdomain
    # certs ride the wildcard SAN. Mirrors every other service in this repo.
    certResolver: duckdns
    domain: zachd.duckdns.org
    wildcardSan: "*.zachd.duckdns.org"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    # ~17k rows parsed + held in memory, plus two enrichment backfills, plus the shelf
    # cutting box scans (a 3366x2100 JPEG decodes to ~21MB of pixels and every crop
    # copies it). The parse and the backfills were already close to 512Mi on their own;
    # adding the image work OOM-killed the pod twice. The cutting is now draft-decoded,
    # strictly serial, and deferred past the startup peak — but give it real headroom.
    memory: 2Gi

# RomM — a Play button on games we can emulate in the browser.
# username/password live in values.local.yaml (a read-only VIEWER account).
romm:
  url: ""                                     # in-cluster, e.g. http://romm:8080
  publicUrl: ""                               # what the browser opens
  username: ""
  password: ""
