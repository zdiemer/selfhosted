{{/*
The IGDB enrichment cache (SQLite) is the app's only persistent state — the
games data itself is always re-fetched from Dropbox. Small; local-path is fine.
*/}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "gamedex.fullname" . }}-data
  labels:
    {{- include "gamedex.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- with .Values.persistence.storageClass }}
  # Only set when non-empty; omitting lets the cluster default (local-path)
  # provision. An explicit "" would mean "no class" and never bind.
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
