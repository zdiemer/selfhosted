apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gamedex.fullname" . }}
  labels:
    {{- include "gamedex.labels" . | nindent 4 }}
spec:
  # Recreate: the IGDB cache PVC is RWO, so never two pods mounting it at once.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "gamedex.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Re-roll when the Dropbox URL secret changes.
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "gamedex.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gamedex
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DROPBOX_XLSX_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gamedex.fullname" . }}
                  key: dropbox-url
            - name: DROPBOX_XLSX_FILENAME
              value: {{ .Values.dropbox.filename | quote }}
            - name: REFRESH_INTERVAL_SECONDS
              value: {{ .Values.refreshIntervalSeconds | quote }}
            # RomM: play emulated games in the browser. The credentials are a
            # read-only viewer account — gamedex only ever READS the rom list.
            - name: ROMM_URL
              value: {{ (.Values.romm | default dict).url | default "" | quote }}
            - name: ROMM_PUBLIC_URL
              value: {{ (.Values.romm | default dict).publicUrl | default "" | quote }}
            - name: ROMM_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "gamedex.fullname" . }}
                  key: romm-username
            - name: ROMM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gamedex.fullname" . }}
                  key: romm-password
            - name: IGDB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "gamedex.fullname" . }}
                  key: igdb-client-id
            - name: IGDB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "gamedex.fullname" . }}
                  key: igdb-client-secret
            - name: ENRICH_DB
              value: /data/enrichment.sqlite
            - name: ENRICH_BACKFILL
              value: {{ .Values.igdb.backfill | quote }}
            - name: HLTB_ENABLED
              value: {{ .Values.igdb.hltb | quote }}
            - name: METACRITIC_ENABLED
              value: {{ .Values.igdb.metacritic | quote }}
            - name: FALLBACK_ENABLED
              value: {{ .Values.igdb.fallback | quote }}
            - name: GAMEEYE_ENABLED
              value: {{ .Values.igdb.gameye | quote }}
            - name: VALUE_RESCRAPE_DAYS
              value: {{ .Values.igdb.valueRescrapeDays | default 7 | quote }}
            - name: ARCADEDB_ENABLED
              value: {{ .Values.igdb.arcadedb | quote }}
            - name: VNDB_ENABLED
              value: {{ .Values.igdb.vndb | quote }}
            - name: THUMBY_ENABLED
              value: {{ .Values.igdb.thumby | quote }}
            - name: VGCHARTZ_ENABLED
              value: {{ .Values.igdb.vgchartz | quote }}
            - name: STEAMX_ENABLED
              value: {{ .Values.igdb.steamx | quote }}
            - name: SPEEDRUN_ENABLED
              value: {{ .Values.igdb.speedrun | quote }}
            - name: GUIDES_ENABLED
              value: {{ .Values.igdb.guides | quote }}
            - name: GAMESPOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gamedex.fullname" . }}
                  key: gamespot-api-key
            - name: GAMESPOT_ENABLED
              value: {{ (.Values.gamespot | default dict).enabled | default false | quote }}
          # Ready only once the first Dropbox load succeeds (health returns 503
          # until then), so traffic never hits an empty dataset.
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            # Liveness hits a static asset so a transient Dropbox outage (which
            # keeps serving last-good data) doesn't trigger a pointless restart.
            httpGet:
              path: /style.css
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            # readOnlyRootFilesystem is on; give libraries a small writable
            # scratch dir. The games data itself stays in memory.
            - name: tmp
              mountPath: /tmp
            # Persistent IGDB enrichment cache (SQLite).
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "gamedex.fullname" . }}-data
