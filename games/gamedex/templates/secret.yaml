{{/*
The Dropbox share URL is semi-sensitive (an unguessable public link), so it
lives in values.local.yaml and is injected via a Secret rather than the
Deployment's plain env.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gamedex.fullname" . }}
  labels:
    {{- include "gamedex.labels" . | nindent 4 }}
type: Opaque
stringData:
  dropbox-url: {{ required "dropbox.url is required (set it in values.local.yaml)" .Values.dropbox.url | quote }}
  igdb-client-id: {{ .Values.igdb.clientId | quote }}
  igdb-client-secret: {{ .Values.igdb.clientSecret | quote }}
  gamespot-api-key: {{ (.Values.gamespot | default dict).apiKey | default "" | quote }}
  romm-username: {{ (.Values.romm | default dict).username | default "" | quote }}
  romm-password: {{ (.Values.romm | default dict).password | default "" | quote }}
