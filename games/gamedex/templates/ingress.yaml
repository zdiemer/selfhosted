{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gamedex.fullname" . }}
  labels:
    {{- include "gamedex.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: {{ .Values.ingress.tls.certResolver }}
    # DuckDNS API can only set TXT at the account's top-level subdomain, so
    # per-host certs for sub-subdomains fail the ACME challenge. We ride a
    # wildcard SAN instead — one cert covers every sub-subdomain.
    traefik.ingress.kubernetes.io/router.tls.domains.0.main: {{ .Values.ingress.tls.domain | quote }}
    traefik.ingress.kubernetes.io/router.tls.domains.0.sans: {{ .Values.ingress.tls.wildcardSan | quote }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "gamedex.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
    {{- /*
      Extra hosts served over the Cloudflare tunnel: TLS is terminated at
      Cloudflare's edge, so these are deliberately absent from the ACME cert list
      below. Traefik routes them by Host header; the tunnel dials in with No TLS
      Verify. A list, so the service can be published across any number of
      external domains. See infra/cloudflared.
    */}}
    {{- range .Values.ingress.cloudflareHosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "gamedex.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
    {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
  {{- end }}
{{- end }}
