<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gamedex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🎮</text></svg>" />
</head>
<body>
  <header class="topbar">
    <button id="brand" class="brand" title="Back to the home page (clears filters)" aria-label="Home">🎮 <span>Gamedex</span></button>
    <input id="search" type="search" placeholder="Search title, genre, publisher, notes…" autocomplete="off" />
    <div class="freshness" id="freshness"></div>
    <button id="cmdk" class="kbdbtn" title="Search everything (Ctrl K)" aria-label="Command palette">
      <span>⌘K</span>
    </button>
    <button id="theme" class="refreshbtn" title="Toggle light / dark" aria-label="Toggle theme">◐</button>
    <button id="refresh" class="refreshbtn" title="Refresh data from Dropbox now" aria-label="Refresh data">⟳</button>
  </header>
  <div class="progress" id="progress" hidden><div class="progress-bar" id="progressBar"></div></div>
  <div id="toast" class="toast" hidden></div>

  <nav class="tabs" id="tabs">
    <button data-tab="home" class="active">🏠 Home</button>
    <button data-tab="games">🎮 All Games</button>
    <button data-tab="completed">🏆 Completed</button>
    <button data-tab="onOrder">📦 On Order</button>
    <button data-tab="reviews">📝 Reviews</button>
    <button data-tab="stats">📊 Stats</button>
    <button data-tab="pick">🎲 Pick</button>
    <button data-tab="challenges">🎯 Challenges</button>
  </nav>

  <main class="layout">
    <div class="facet-backdrop" id="facetBackdrop" hidden></div>
    <aside class="facets" id="facets"></aside>
    <section class="results">
      <div class="resultbar">
        <button id="facetToggle" class="facet-toggle">☰ Filters</button>
        <span id="count">Loading…</span>
        <span id="enrichstatus" class="enrichstatus" hidden></span>
        <button id="resetsort" class="linkbtn" hidden>Reset sort</button>
        <button id="clear" class="linkbtn" hidden>Clear filters</button>
        <span class="spacer"></span>
        <div class="rb-controls" id="rbControls">
          <span id="gridsortwrap" class="ctl" hidden>
            <label>Sort <select id="gridsort"></select></label>
            <button id="gridsortdir" class="dirbtn" title="Toggle direction">▼</button>
          </span>
          <label class="ctl">Per page
            <select id="pagesize">
              <option>25</option><option selected>50</option><option>100</option><option>200</option><option>500</option>
            </select>
          </label>
          <span class="viewtoggle">
            <button id="viewTable" title="Table view" aria-label="Table view">☰</button>
            <button id="viewGrid" class="active" title="Grid view" aria-label="Grid view">▦</button>
          </span>
        </div>
      </div>
      <div class="tablewrap" id="tablewrap">
        <table id="table">
          <thead><tr id="thead"></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="gridwrap" id="gridwrap" hidden>
        <div class="grid" id="grid"></div>
      </div>
      <div class="stats" id="stats" hidden></div>
      <div class="picker" id="picker" hidden></div>
      <div class="challenges" id="challenges" hidden></div>
      <div class="home" id="home" hidden></div>
      <div class="reviews" id="reviews" hidden></div>
      <div class="pager" id="pager"></div>
    </section>
  </main>

  <div class="drawer-overlay" id="overlay" hidden>
    <div class="drawer" id="drawer" role="dialog" aria-modal="true">
      <button class="drawer-close" id="drawerClose" aria-label="Close">✕</button>
      <div id="drawerBody"></div>
    </div>
  </div>

  <!-- Mobile: filters/sort reachable without scrolling back to the top -->
  <div class="fab" id="fab">
    <button id="fabFilters">☰ Filters</button>
    <button id="fabSort">⇅ Sort &amp; view</button>
    <button id="fabTop" title="Back to top" aria-label="Back to top">↑</button>
  </div>
  <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
  <div class="sheet" id="sheet" hidden>
    <div class="sheet-head"><b>Sort &amp; view</b><button id="sheetClose" aria-label="Close">✕</button></div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous">‹</button>
    <img id="lbImg" alt="" />
    <button class="lb-nav lb-next" id="lbNext" aria-label="Next">›</button>
    <div class="lb-count" id="lbCount"></div>
  </div>

  <div id="banner" class="banner" hidden></div>

  <div class="cmdk" id="cmdkOverlay" hidden>
    <div class="cmdk-box" role="dialog" aria-modal="true" aria-label="Command palette">
      <input id="cmdkInput" type="text" placeholder="Jump to a game, tab or filter…" autocomplete="off" spellcheck="false" />
      <div class="cmdk-results" id="cmdkResults"></div>
      <div class="cmdk-foot"><kbd>↑</kbd><kbd>↓</kbd> navigate · <kbd>↵</kbd> open · <kbd>esc</kbd> close</div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="charts.js"></script>
  <script src="home.js"></script>
  <script src="reviews.js"></script>
  <script src="collections.js"></script>
  <script src="challenges.js"></script>
</body>
</html>
