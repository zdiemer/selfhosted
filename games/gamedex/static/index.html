<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gamedex</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🎮</text></svg>" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🎮 <span>Gamedex</span></div>
    <input id="search" type="search" placeholder="Search title, genre, publisher, notes…" autocomplete="off" />
    <div class="freshness" id="freshness"></div>
    <button id="refresh" class="refreshbtn" title="Refresh data from Dropbox now" aria-label="Refresh data">⟳</button>
  </header>
  <div id="toast" class="toast" hidden></div>

  <nav class="tabs" id="tabs">
    <button data-tab="games" class="active">All Games</button>
    <button data-tab="completed">Completed</button>
    <button data-tab="onOrder">On Order</button>
  </nav>

  <main class="layout">
    <aside class="facets" id="facets"></aside>
    <section class="results">
      <div class="resultbar">
        <button id="facetToggle" class="facet-toggle">☰ Filters</button>
        <span id="count">Loading…</span>
        <span id="enrichstatus" class="enrichstatus" hidden></span>
        <button id="resetsort" class="linkbtn" hidden>Reset sort</button>
        <button id="clear" class="linkbtn" hidden>Clear filters</button>
        <span class="spacer"></span>
        <span id="gridsortwrap" class="ctl" hidden>
          <label>Sort <select id="gridsort"></select></label>
          <button id="gridsortdir" class="dirbtn" title="Toggle direction">▼</button>
        </span>
        <label class="ctl">Per page
          <select id="pagesize">
            <option>25</option><option selected>50</option><option>100</option><option>200</option><option>500</option>
          </select>
        </label>
        <span class="viewtoggle">
          <button id="viewTable" title="Table view" aria-label="Table view">☰</button>
          <button id="viewGrid" class="active" title="Grid view" aria-label="Grid view">▦</button>
        </span>
      </div>
      <div class="tablewrap" id="tablewrap">
        <table id="table">
          <thead><tr id="thead"></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="gridwrap" id="gridwrap" hidden>
        <div class="grid" id="grid"></div>
      </div>
      <div class="pager" id="pager"></div>
    </section>
  </main>

  <div class="drawer-overlay" id="overlay" hidden>
    <div class="drawer" id="drawer" role="dialog" aria-modal="true">
      <button class="drawer-close" id="drawerClose" aria-label="Close">✕</button>
      <div id="drawerBody"></div>
    </div>
  </div>

  <div id="banner" class="banner" hidden></div>

  <script src="app.js"></script>
</body>
</html>
