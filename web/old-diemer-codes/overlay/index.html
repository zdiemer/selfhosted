<!DOCTYPE html>
<html lang="en">

<!--
  Replaces site/public/index.html at image build time (see Dockerfile). The site
  repo is a frozen archive we deliberately do not modify, so the three changes
  below live here instead of upstream. Everything else is byte-for-byte the
  original.

  A whole file rather than sed patches: it is short, upstream is frozen so it
  cannot drift, and a diff against site/public/index.html reviews in seconds.

  1. Dropped the Google Analytics gtag block for UA-118747915-1. Universal
     Analytics stopped processing data in July 2023, so it collected nothing --
     it was purely a third-party request and a cookie on every load.

  2. Added the Fira Code stylesheet below. site.less asks for "Fira Code" in
     three places but only ever loaded it via an @import of cdn.rawgit.com, which
     shut down in 2019 -- and that @import sits after all other rules, which is
     invalid CSS that browsers ignore anyway. So the font has been silently
     falling back to sans-serif for years. The existing font-family rules pick it
     up as soon as it actually loads; a <link> is the whole fix.

     Weights 300/400/700, matching what the old rawgit bundle carried. site.less
     asks for font-weight:100 in two places, but Fira Code has no 100 -- 300 is
     its lightest, and that is what 100 snaps to.

  3. Added the archive banner. The page still says its author currently works at
     Google and publishes a 2019 phone number; it needs to say up front that it
     is a period piece, not a current CV.

     Static markup in the shell rather than a component in Site.jsx, for the same
     reason as everything else here: Site.jsx belongs to the frozen repo. It also
     means the notice is in the HTML on arrival -- it does not wait on the React
     bundle, and it survives in the <noscript> case where #root renders nothing.
-->

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="theme-color" content="#000000">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json">
  <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico">
  <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&display=swap" rel="stylesheet">
  <!-- Generated by `npm run build-css` (lessc), NOT by `npm run build`. See the Dockerfile. -->
  <link href="%PUBLIC_URL%/site.css" rel="stylesheet">

  <!--
    Archive banner. Last in the head so it wins over site.css on equal
    specificity; scoped under one class that site.less never mentions.

    Colours are lifted from Site.jsx's `Styles.Color` (Black #202020, White
    #E9E9E9, Yellow #EAC67A) so this reads as part of the page rather than as
    something bolted on. The yellow is already the caret and the tagline border.

    The background must stay fully opaque: BodyContainer::after paints a fixed,
    viewport-covering photo that the page scrolls under, and a translucent bar
    would put body text through the banner.

    z-index 10 clears BodyContainer's z-index 1. That 1 does apply despite the
    element being position:static -- it is a flex item, and z-index applies to
    flex items. So it makes a stacking context in the root context, and the
    banner has to out-rank it rather than merely be later in the document.

    position:sticky's scroll container here is the viewport and its containing
    block is <body>, which is as tall as the document -- so it stays put for the
    whole scroll. It relies on `body { margin: 0 }` (site.less:2) to reach the
    edges.

    The .social override is not cosmetic. site.less:109 pins the social icons at
    `position: fixed; top: 1em; z-index: 9000` -- fixed to the VIEWPORT, so they
    do not move for a banner in the flow, and 9000 beats any sane z-index we
    could give it. Left alone they sit on top of the banner text. They get pushed
    down by the banner's height instead of the banner being raised above them,
    because raising it would just bury permanently-fixed icons under it.

    Why a script for the offset, in a page that otherwise needs none: the height
    is not a constant to hardcode. The text wraps at narrow widths, and it
    reflows again when Fira Code swaps in, so the offset has to be measured. The
    icons are rendered by React inside #root -- with JS off they do not exist,
    and there is nothing to collide with -- so the collision and its fix appear
    and disappear together. The CSS fallback only covers the parse-to-script gap.
  -->
  <style>
    .archive-banner {
      position: sticky;
      top: 0;
      z-index: 10;
      box-sizing: border-box;
      padding: 0.65rem 1rem;
      background: #202020;
      border-bottom: 1px solid #EAC67A;
      color: #E9E9E9;
      font-family: 'Fira Code', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      line-height: 1.5;
      text-align: center;
    }

    .archive-banner strong {
      color: #EAC67A;
      font-weight: 700;
    }

    /* Wins over site.less:109 on source order -- this block is after the
       site.css <link>, at equal specificity. */
    .social {
      top: calc(var(--archive-banner-height, 2.6rem) + 1em);
    }

    @media screen and (max-width: 40rem) {
      .archive-banner {
        padding: 0.5rem 0.75rem;
        font-size: 0.7rem;
        text-align: left;
      }
    }
  </style>

  <title>Zach Diemer's Personal Page</title>
</head>

<body>
  <noscript>
    You need to enable JavaScript to run this app.
  </noscript>
  <div class="archive-banner">
    This is an <strong>archived copy</strong> of my personal site as it stood in 2019.
    It hasn't been updated since, and is preserved here as-is for posterity.
  </div>
  <div id="root"></div>

  <!--
    Publishes the banner's measured height as --archive-banner-height, which the
    .social rule above uses to keep the fixed social icons clear of it. See the
    long note in the head for why this is measured rather than hardcoded.

    ResizeObserver rather than a one-shot read: the banner reflows when it wraps
    at narrow widths and again when Fira Code swaps in, and both happen after
    this runs. The resize listener is the fallback for browsers without RO.
  -->
  <script>
    (function () {
      var banner = document.querySelector('.archive-banner');
      if (!banner) return;

      function sync() {
        document.documentElement.style.setProperty(
          '--archive-banner-height', banner.offsetHeight + 'px');
      }

      sync();
      if (window.ResizeObserver) new ResizeObserver(sync).observe(banner);
      else window.addEventListener('resize', sync);
    })();
  </script>
</body>

</html>
