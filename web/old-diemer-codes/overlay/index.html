<!DOCTYPE html>
<html lang="en">

<!--
  Replaces site/public/index.html at image build time (see Dockerfile). The site
  repo is a frozen archive we deliberately do not modify, so the two changes
  below live here instead of upstream. Everything else is byte-for-byte the
  original.

  A whole file rather than sed patches: it is 30 lines, upstream is frozen so it
  cannot drift, and a diff against site/public/index.html reviews in seconds.

  1. Dropped the Google Analytics gtag block for UA-118747915-1. Universal
     Analytics stopped processing data in July 2023, so it collected nothing --
     it was purely a third-party request and a cookie on every load.

  2. Added the Fira Code stylesheet below. site.less asks for "Fira Code" in
     three places but only ever loaded it via an @import of cdn.rawgit.com, which
     shut down in 2019 -- and that @import sits after all other rules, which is
     invalid CSS that browsers ignore anyway. So the font has been silently
     falling back to sans-serif for years. The existing font-family rules pick it
     up as soon as it actually loads; a <link> is the whole fix.

     Weights 300/400/700, matching what the old rawgit bundle carried. site.less
     asks for font-weight:100 in two places, but Fira Code has no 100 -- 300 is
     its lightest, and that is what 100 snaps to.
-->

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="theme-color" content="#000000">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json">
  <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico">
  <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&display=swap" rel="stylesheet">
  <!-- Generated by `npm run build-css` (lessc), NOT by `npm run build`. See the Dockerfile. -->
  <link href="%PUBLIC_URL%/site.css" rel="stylesheet">
  <title>Zach Diemer's Personal Page</title>
</head>

<body>
  <noscript>
    You need to enable JavaScript to run this app.
  </noscript>
  <div id="root"></div>
</body>

</html>
