# old.diemer.codes -- Create React App build output, served static.
#
# Baked into the image rather than mounted from a ConfigMap. web/kelsey-green
# uses a ConfigMap because it has no image of its own -- that is its only option.
# Here the rules below encode CRA's fingerprinting scheme and know exactly which
# files are unhashed, so config and assets are two halves of one thing: they ship
# as one artifact and version together with image.tag.

# Cache-Control decided ONCE, here, instead of with per-location add_header.
# add_header does NOT merge: the instant a location declares one of its own, it
# drops every add_header inherited from the server block. Per-location
# Cache-Control would therefore silently throw away the security headers below.
# A map keeps a single add_header at server level and still varies the value.
#
# $uri is resolved when the header is written -- i.e. AFTER try_files has
# internally redirected an unknown path to /index.html -- so the SPA fallback
# lands on the no-store row rather than the default one.
map $uri $site_cache_control {
    # CRA content-hashes everything under /static/ (js, css, media), so those
    # URLs can never change meaning.
    "~^/static/"                        "public, max-age=31536000, immutable";

    # The shell. It names the hashed bundles, so a stale copy pins a visitor to
    # a dead deploy indefinitely.
    "/index.html"                       "no-store";

    # src/index.js calls registerServiceWorker(), so CRA emits a Workbox worker
    # that precaches the whole app. A cached service-worker.js is a site that can
    # never be updated: the old worker keeps serving its old precache and never
    # learns a new one exists. Same for the manifest it importScripts().
    "/service-worker.js"                "no-store";
    "~^/precache-manifest\..+\.js$"     "no-store";
    "/asset-manifest.json"              "no-store";

    "/healthz"                          "no-store";

    # Everything else: favicon.ico, manifest.json, site.css, site.css.map.
    # site.css is the one that matters -- lessc writes it to a FIXED name, so
    # unlike /static/ it is not fingerprinted and must stay short-lived, or a
    # style change would never reach anyone who has been here before.
    default                             "public, max-age=300";
}

server {
    # 8080, not 80: nginx-unprivileged runs as uid 101 and cannot bind a
    # privileged port. The Service maps 80 -> 8080.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    add_header Cache-Control $site_cache_control always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Deliberately no CSP: styled-components injects <style> at runtime, so any
    # workable policy needs 'unsafe-inline' for style-src -- it would buy
    # essentially nothing while adding a new way to break the site silently.

    # A miss under /static/ is a broken build, not a route. 404 it rather than
    # letting the SPA fallback hand back index.html with a 200 -- a <script> that
    # receives HTML fails with a baffling "Unexpected token '<'".
    location /static/ {
        try_files $uri =404;
    }

    # Cheap probe target, so readiness/liveness don't write a log line every few
    # seconds. `default_type`, NOT `add_header Content-Type` -- an add_header here
    # would drop all three inherited above (see the map comment).
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # For GET /, $uri ends in a slash, so try_files does a directory test that
    # matches the docroot, declines, and the index module serves /index.html. If
    # it instead fell through, the /index.html fallback serves the same file.
    # Both branches land in the same place, so `/` is safe without the usual
    # `$uri/` element -- and omitting it means a SPA never risks a directory
    # listing.
    location / {
        try_files $uri /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    # text/html is always gzipped when gzip is on; listing it is a no-op.
    gzip_types text/css application/javascript application/json image/svg+xml;
}
