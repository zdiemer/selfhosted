apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kelsey-green.fullname" . }}
  labels:
    {{- include "kelsey-green.labels" . | nindent 4 }}
type: Opaque
stringData:
  ssh: {{ required "gitSync.deployKey is required (set it in values.local.yaml)" .Values.gitSync.deployKey | quote }}
  known_hosts: {{ required "gitSync.knownHosts is required" .Values.gitSync.knownHosts | quote }}
{{- if .Values.cloudflared.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kelsey-green.fullname" . }}-cloudflared
  labels:
    {{- include "kelsey-green.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ required "cloudflared.token is required when cloudflared.enabled (set it in values.local.yaml)" .Values.cloudflared.token | quote }}
{{- end }}
