{{/*
⚠️ Deliberately NO Authelia forward-auth here — the only chart in this repo's
web tier without it. The Happy iOS/Android/web apps talk REST + WebSocket
straight to this API and cannot complete an interactive forward-auth flow.
The security model is Happy's own: clients generate keypairs locally, pair via
QR code, and end-to-end encrypt every payload before it reaches this server —
the relay (and anyone who breaches it) sees only ciphertext. Do NOT attach
the shared forward-auth middleware "for safety"; it just breaks the app while
protecting nothing the E2E crypto doesn't already cover.
*/}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "happy-server.fullname" . }}
  labels:
    {{- include "happy-server.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: {{ .Values.ingress.tls.certResolver }}
    # DuckDNS API can only set TXT at the account's top-level subdomain, so
    # per-host certs for sub-subdomains fail the ACME challenge. We ride a
    # wildcard SAN instead — one cert covers every sub-subdomain.
    traefik.ingress.kubernetes.io/router.tls.domains.0.main: {{ .Values.ingress.tls.domain | quote }}
    traefik.ingress.kubernetes.io/router.tls.domains.0.sans: {{ .Values.ingress.tls.wildcardSan | quote }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "happy-server.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
    {{- /*
      Extra hosts served over the Cloudflare tunnel: TLS is terminated at
      Cloudflare's edge, so these are deliberately absent from the ACME cert
      list below. The tunnel dials in with No TLS Verify. See infra/cloudflared.
    */}}
    {{- range .Values.ingress.cloudflareHosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "happy-server.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
    {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
  {{- end }}
{{- end }}
