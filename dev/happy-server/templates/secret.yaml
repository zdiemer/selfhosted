apiVersion: v1
kind: Secret
metadata:
  name: {{ include "happy-server.fullname" . }}
  labels:
    {{- include "happy-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  HANDY_MASTER_SECRET: {{ required "masterSecret is required — set it in values.local.yaml (see README)" .Values.masterSecret | quote }}
