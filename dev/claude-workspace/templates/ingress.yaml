{{/*
One path per host: /term → ttyd, which serves itself under --base-path /term,
so no StripPrefix middleware and the websocket endpoint passes through Traefik
and the Cloudflare tunnel untouched. Nothing serves / anymore — the mobile
surface moved to the Happy app + dev/happy-server relay.
*/}}
{{- define "claude-workspace.paths" -}}
- path: /term
  pathType: Prefix
  backend:
    service:
      name: {{ include "claude-workspace.fullname" . }}
      port:
        number: {{ .Values.service.termPort }}
{{- end }}
{{/*
Bakery's own host: /api (REST + the /api/sessions/<id>/ws WebSocket) → the Bun
server, everything else → the Vite web UI. Same longest-prefix ordering as
/term, and same-origin so the client's baked apiBase, the Authelia cookie, and
Vite's Host check all line up.
*/}}
{{- define "claude-workspace.bakeryPaths" -}}
- path: /api
  pathType: Prefix
  backend:
    service:
      name: {{ include "claude-workspace.fullname" . }}
      port:
        number: {{ .Values.service.bakeryServerPort }}
- path: /
  pathType: Prefix
  backend:
    service:
      name: {{ include "claude-workspace.fullname" . }}
      port:
        number: {{ .Values.service.bakeryWebPort }}
{{- end }}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "claude-workspace.fullname" . }}
  labels:
    {{- include "claude-workspace.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: {{ .Values.ingress.tls.certResolver }}
    # DuckDNS API can only set TXT at the account's top-level subdomain, so
    # per-host certs for sub-subdomains fail the ACME challenge. We ride a
    # wildcard SAN instead — one cert covers every sub-subdomain.
    traefik.ingress.kubernetes.io/router.tls.domains.0.main: {{ .Values.ingress.tls.domain | quote }}
    traefik.ingress.kubernetes.io/router.tls.domains.0.sans: {{ .Values.ingress.tls.wildcardSan | quote }}
    {{- if .Values.auth.forwardAuth.enabled }}
    # Gate the whole host behind Authelia (see templates/middleware-forwardauth.yaml).
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ include "claude-workspace.fullname" . }}-forwardauth@kubernetescrd
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{- include "claude-workspace.paths" . | nindent 10 }}
    {{- /*
      Extra hosts served over the Cloudflare tunnel: TLS is terminated at
      Cloudflare's edge, so these are deliberately absent from the ACME cert
      list below. Traefik routes them by Host header and applies the same
      Authelia forward-auth middleware as the DuckDNS host; the tunnel dials
      in with No TLS Verify. See infra/cloudflared.
    */}}
    {{- range .Values.ingress.cloudflareHosts }}
    - host: {{ . | quote }}
      http:
        paths:
          {{- include "claude-workspace.paths" $ | nindent 10 }}
    {{- end }}
    {{- /*
      Bakery: a single duckdns host (no Cloudflare host — see values bakery.host).
      Rides the same wildcard cert and Authelia middleware as the host above.
    */}}
    {{- if .Values.bakery.enabled }}
    - host: {{ .Values.bakery.host | quote }}
      http:
        paths:
          {{- include "claude-workspace.bakeryPaths" $ | nindent 10 }}
    {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
        {{- if .Values.bakery.enabled }}
        - {{ .Values.bakery.host }}
        {{- end }}
  {{- end }}
{{- end }}
