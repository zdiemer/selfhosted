apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-workspace.fullname" . }}
  labels:
    {{- include "claude-workspace.labels" . | nindent 4 }}
spec:
  # Single replica — one RWO home PVC and one tmux server; two pods would
  # split-brain both.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "claude-workspace.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claude-workspace.labels" . | nindent 8 }}
    spec:
      {{- if .Values.rbac.clusterAdmin }}
      # Cluster ops seat: kubectl/helm in the pod authenticate as this SA
      # (cluster-admin — see rbac.yaml and the values warning).
      serviceAccountName: {{ include "claude-workspace.fullname" . }}
      automountServiceAccountToken: true
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      securityContext:
        runAsUser: 1000          # `node` user from the base image
        runAsGroup: 1000
        fsGroup: 1000
        # Without this, fsGroup recursively re-permissions the ENTIRE home PVC
        # to g+rw on every pod start — which silently breaks ~/.ssh key perms
        # (ssh refuses 0660 keys). Everything is already owned 1000:1000, so
        # skip the relabel when the mount root matches.
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Bootstrap the home PVC on first boot: the standard dirs claude,
        # happy, and ssh expect, with the right perms. Idempotent.
        - name: init-home
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /home/node/.claude /home/node/.happy /home/node/code
              mkdir -p /home/node/.ssh && chmod 700 /home/node/.ssh
              mkdir -p /home/node/.local/share/tailscale
              chmod 700 /home/node/.local/share/tailscale
              mkdir -p /home/node/.docker && chmod 700 /home/node/.docker
              {{- if .Values.bakery.enabled }}
              # Bakery state (sessions/artifacts DB) + its agent's creds (~/.pi,
              # a one-time interactive login).
              mkdir -p {{ .Values.bakery.dataDir }} /home/node/.pi
              chmod 700 /home/node/.pi
              {{- end }}
              echo "home initialized"
          volumeMounts:
            - name: home
              mountPath: /home/node
      containers:
        # ttyd: the real Claude Code TUI in the browser. `tmux new -A -s main`
        # attaches every browser connection to the same session, so closing
        # Safari (or iOS suspending it) leaves claude running; reopening
        # /term lands back in the live session.
        - name: term
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.security.readOnlyRootFilesystem }}
            capabilities:
              drop: ["ALL"]
          # -W: writable (ttyd ≥1.7 defaults to read-only). --base-path lets
          # the ingress route /term here with no StripPrefix middleware, so
          # the websocket URL survives Traefik and the Cloudflare tunnel
          # unchanged.
          command:
            - ttyd
            - -W
            - -p
            - {{ .Values.service.termPort | quote }}
            - --base-path
            - /term
            - tmux
            - new
            - -A
            - -s
            - main
          env:
            - name: HOME
              value: /home/node
            # scripts/k3s/_common.sh: non-sudo node commands ssh as $SSH_USER.
            # The pod's local user `node` exists on no node, so go root — the
            # same access run_on_node_sudo already uses.
            - name: SSH_USER
              value: root
            # Point the happy CLI (mobile remote control) at the self-hosted
            # relay (dev/happy-server). Public URL on purpose: the QR pairing
            # flow may embed it, and the phone can only reach the public host.
            # Egress rides the existing TCP-443-to-public rule (hairpin NAT);
            # if hairpin ever breaks, the netpol also allows the cluster-local
            # fallback — see happy.serverUrl in values.yaml.
            - name: HAPPY_SERVER_URL
              value: {{ .Values.happy.serverUrl | quote }}
          ports:
            - name: term
              containerPort: {{ .Values.service.termPort }}
          # TCP probes: ttyd's HTTP surface under --base-path is an
          # implementation detail; the listener itself is the health signal.
          readinessProbe:
            tcpSocket:
              port: term
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: term
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.term | nindent 12 }}
        {{- if .Values.happy.daemon.enabled }}
        # happy daemon: an always-on supervised sidecar so the Happy app can
        # spawn NEW sessions the moment the pod is Ready — no manual
        # `happy daemon start` from /term after every restart. `start-sync` is
        # the daemon's foreground entrypoint (plain `start` forks and exits, no
        # good as a container process); it installs SIGTERM handlers, so k8s
        # stops/restarts it cleanly. It shares ~/.happy on the PVC (pairing keys
        # + the daemon.state.json.lock singleton) with the interactive `happy`
        # in /term; because both run the same image = same happy version, the
        # interactive one detects this daemon and defers instead of starting a
        # rival (a version skew would make them kill each other — see the
        # happy.daemon note in values.yaml). Phone-spawned sessions run as
        # CHILDREN of this container, so it carries claude-sized resources.
        - name: happy-daemon
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.security.readOnlyRootFilesystem }}
            capabilities:
              drop: ["ALL"]
          # Loop rather than a bare `exec`: on a restart where the interactive
          # path already spawned a same-version daemon, start-sync finds the
          # lock held, prints "already running", and exits 0 — the loop retries
          # after a pause instead of the container flapping into CrashLoopBackOff.
          # In the normal case (fresh pod, this is the first happy process)
          # start-sync wins the lock and blocks in the foreground until SIGTERM.
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                happy daemon start-sync || true
                sleep 10
              done
          env:
            - name: HOME
              value: /home/node
            # Same relay the term container's happy CLI uses; the daemon reads
            # HAPPY_SERVER_URL with highest precedence over ~/.happy/settings.json.
            - name: HAPPY_SERVER_URL
              value: {{ .Values.happy.serverUrl | quote }}
          # No probes: the daemon's only health surface is an HTTP control
          # server on a 127.0.0.1 EPHEMERAL port recorded in
          # ~/.happy/daemon.state.json (`happy daemon status` always exits 0 and
          # is useless as a probe). Not worth an exec-probe that parses the
          # state file — same "no probes on purpose" stance as tailscaled below.
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.happyDaemon | nindent 12 }}
        {{- end }}
        {{- if .Values.bakery.enabled }}
        # Bakery server: the Bun API + WebSocket backend (routes under /api/*).
        # The browser reaches it directly through the ingress path-split, so it
        # binds 0.0.0.0; Authelia is the only gate (no PI_WEB_AUTH_TOKEN unless
        # bakery.authToken is set). State lives on the PVC under dataDir.
        - name: bakery-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.bakery.readOnlyRootFilesystem }}
            capabilities:
              drop: ["ALL"]
          command: ["bash", "-lc", "cd /opt/bakery && exec bun run start"]
          env:
            - name: HOME
              value: /home/node
            - name: PI_WEB_HOST
              value: "0.0.0.0"
            - name: PI_WEB_PORT
              value: {{ .Values.service.bakeryServerPort | quote }}
            - name: PI_WEB_WORKSPACE_ROOT
              value: {{ .Values.bakery.workspaceRoot | quote }}
            - name: PI_WEB_DATA_DIR
              value: {{ .Values.bakery.dataDir | quote }}
            # Same-origin as the web UI, so this is the only allowed CORS/WS origin.
            - name: PI_WEB_ALLOWED_ORIGINS
              value: {{ .Values.bakery.apiBase | quote }}
            {{- if .Values.bakery.authToken }}
            - name: PI_WEB_AUTH_TOKEN
              value: {{ .Values.bakery.authToken | quote }}
            {{- end }}
            {{- range $k, $v := .Values.bakery.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          ports:
            - name: bakery-api
              containerPort: {{ .Values.service.bakeryServerPort }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: bakery-api
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: bakery-api
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.bakeryServer | nindent 12 }}
        # Bakery web: the Vite dev server (the SPA). VITE_PI_WEB_API_BASE bakes
        # the absolute origin the client uses for REST + WS, so the browser
        # never sees the :3141 default. PI_WEB_ALLOWED_HOSTS is Vite's own
        # Host-header allowlist — the ingress host must be in it or Vite 403s.
        - name: bakery-web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.bakery.readOnlyRootFilesystem }}
            capabilities:
              drop: ["ALL"]
          command: ["bash", "-lc", "cd /opt/bakery && exec bun run dev:web:lan"]
          env:
            - name: HOME
              value: /home/node
            - name: PI_WEB_ALLOWED_HOSTS
              value: {{ .Values.bakery.host | quote }}
            - name: VITE_PI_WEB_API_BASE
              value: {{ .Values.bakery.apiBase | quote }}
            {{- if .Values.bakery.authToken }}
            # Baked so the browser authenticates automatically (defense-in-depth
            # behind Authelia; the token still rides in the client bundle).
            - name: VITE_PI_WEB_AUTH_TOKEN
              value: {{ .Values.bakery.authToken | quote }}
            {{- end }}
          ports:
            - name: bakery-web
              containerPort: {{ .Values.service.bakeryWebPort }}
          # TCP probe: Vite's allowedHosts rejects an httpGet with a pod-IP Host
          # header (403), so the listener itself is the health signal — same
          # reasoning as ttyd's probes above.
          readinessProbe:
            tcpSocket:
              port: bakery-web
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: bakery-web
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.bakeryWeb | nindent 12 }}
        {{- end }}
        {{- if .Values.tailscale.enabled }}
        # tailscaled with userspace networking: outbound dials go through its
        # in-process netstack, which is all `tailscale ssh root@<node>` needs —
        # no TUN device, no root, no extra capabilities. The term container's
        # `tailscale` CLI reaches it over the socket on the shared /tmp.
        # State (node key, prefs) lives on the home PVC so the one-time
        # `tailscale up` login survives restarts.
        - name: tailscaled
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              mkdir -p /tmp/tailscale
              exec tailscaled \
                --tun=userspace-networking \
                --statedir=/home/node/.local/share/tailscale \
                --socket=/tmp/tailscale/tailscaled.sock
          env:
            - name: HOME
              value: /home/node
          # No probes on purpose: `tailscale status` exits non-zero while
          # logged out, and a probe would kill the container before the
          # one-time interactive `tailscale up` could ever happen.
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 256Mi
        {{- end }}
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: {{ include "claude-workspace.fullname" . }}-home
        # Shared tmpfs — tmux sockets (/tmp/tmux-1000), the tailscaled socket,
        # npm/npx caches, git temp objects. Ephemeral by design; roomier than
        # the bridge's since interactive dev leans on /tmp harder.
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
