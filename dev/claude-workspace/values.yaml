image:
  # Custom image (Dockerfile in this dir): node + claude-code CLI + CloudCLI
  # (claudecodeui) + ttyd + tmux + dev basics. Built by build.sh, pushed to a
  # PUBLIC GHCR package so every node can pull it anonymously — see
  # minecraft/claude-bridge/build.sh for why we never side-load images.
  repository: "ghcr.io/zdiemer/claude-workspace"
  # v2: adds kubectl/helm/buildctl/tailscale for cluster ops (see README
  # "Cluster powers"). v3: vendors bakery (the /bakery web harness surface).
  tag: "v3"
  # Static tag, so always re-pull on pod (re)start to pick up rebuilds.
  pullPolicy: Always

service:
  type: ClusterIP
  # CloudCLI web UI (Express API + WebSocket + SPA).
  uiPort: 3001
  # ttyd web terminal (served under /term, see ingress).
  termPort: 7681
  # Bakery is two processes: the Bun API/WebSocket server and the Vite web UI.
  # The browser talks to BOTH directly (there is no Vite→server proxy), so the
  # ingress path-splits one host: /api → server, everything else → web. Ports
  # match bakery's own defaults (PI_WEB_PORT / vite --port).
  bakeryServerPort: 3141
  bakeryWebPort: 5173

persistence:
  # One PVC = the pod's entire $HOME (/home/node). Holds ~/.claude (OAuth
  # creds + conversation jsonl), ~/.cloudcli (CloudCLI's sqlite), ~/.ssh,
  # and all repo checkouts under ~/code. Everything that matters survives
  # pod restarts and reschedules; nothing is node-pinned.
  home:
    size: 20Gi
    storageClass: ""              # "" → cluster default StorageClass (k3s local-path)
    accessMode: ReadWriteOnce

security:
  # Escape hatch: CloudCLI is only *expected* to write under $HOME (its
  # DATABASE_PATH is pointed there). If a future version insists on writing
  # into its package dir, flip this off in values.local.yaml.
  readOnlyRootFilesystem: true

rbac:
  # ⚠️ Binds the workspace's ServiceAccount to cluster-admin (same tradeoff as
  # infra/headlamp): the pod can deploy/delete anything in the cluster,
  # including its own chart. Authelia forward-auth on the ingress is the ONLY
  # gate in front of that power — keep auth.forwardAuth.enabled on. Flip this
  # off to return the pod to zero API access (no SA token mounted at all).
  clusterAdmin: true

tailscale:
  # Runs a tailscaled container (userspace networking, no TUN, no root) so the
  # scripts/k3s maintenance scripts can `tailscale ssh root@<node>` from the
  # pod. State lives on the home PVC; auth is a one-time interactive
  # `tailscale up` from the web terminal — see README.
  enabled: true

networkPolicy:
  enabled: true
  # LAN subnet the k3s nodes live on. Used for the kube-API egress rule: the
  # API ClusterIP (10.43.0.1:443) is DNAT'd to <node>:6443, and depending on
  # where the netpol is evaluated the packet may already carry the node IP.
  nodeCIDR: "192.168.4.0/24"

auth:
  # Gate both web surfaces at the Traefik ingress with Authelia forward-auth
  # (same pattern as docs/stirling-pdf). Neither CloudCLI nor ttyd is safe to
  # expose bare: together they are a remote shell on the cluster.
  forwardAuth:
    enabled: true
    autheliaService: authelia     # Authelia release/service name
    autheliaNamespace: auth       # namespace Authelia runs in
    autheliaPort: 9091
    autheliaPath: /api/authz/forward-auth

ingress:
  # Disabled for first boot. Flip on (in values.local.yaml) after the pod is
  # Ready and a port-forward smoke test passes — see README.
  enabled: false
  className: traefik
  host: claude.zachd.duckdns.org
  # Additional hosts published via the Cloudflare tunnel (infra/cloudflared).
  # TLS for these terminates at Cloudflare, so they are NOT in the ACME cert
  # list. Requires a one-time Public Hostname entry in the CF dashboard.
  cloudflareHosts:
    - claude.diemer.codes
  tls:
    enabled: true
    # DuckDNS can only write TXT at the account's top-level, so sub-subdomain
    # certs must ride a wildcard SAN. See infra/duckdns.
    certResolver: duckdns
    domain: zachd.duckdns.org
    wildcardSan: "*.zachd.duckdns.org"

cloudcli:
  # Extra env for the CloudCLI container, e.g. CONTEXT_WINDOW: "200000".
  extraEnv: {}

bakery:
  # The bakery web harness (github.com/seemethere/bakery), vendored into the
  # image (image.tag v3+). Two containers — the Bun server and the Vite web —
  # share the same $HOME PVC as the rest of the workspace.
  enabled: true
  # Bakery's web client bakes ONE absolute API origin at serve time
  # (VITE_PI_WEB_API_BASE below), so bakery is reachable on exactly this host —
  # NOT over the diemer.codes Cloudflare tunnel like the / and /term surfaces.
  # Serving it on a second domain would need a second build (a fork we avoided).
  # This host rides the *.zachd.duckdns.org wildcard cert and Authelia's
  # zachd.duckdns.org SSO cookie (auth/authelia sessionDomain), so no extra
  # cert or access-control rule is needed — default_policy two_factor covers it.
  host: bakery.zachd.duckdns.org
  # Absolute origin the web client uses for REST + WebSocket. Must equal the
  # host above (same-origin → the Authelia cookie and CORS both just work; the
  # ingress routes /api on this origin to the Bun server). Leaving the default
  # :3141 in the client would force a second public port — this avoids it.
  apiBase: "https://bakery.zachd.duckdns.org"
  # Directories bakery agent sessions may touch (comma-separated allowlist).
  # The workspace repos, same as everything else on this pod.
  workspaceRoot: /home/node/code
  # Bakery's own state (metadata sqlite, sessions, artifacts, worktrees). On the
  # PVC so it survives restarts. Its coding agent's credentials live in ~/.pi
  # (a one-time interactive login — see README "Bakery surface").
  dataDir: /home/node/.pi-web-agent
  # Bakery requires no token of its own: Authelia forward-auth is the gate, same
  # as the / and /term surfaces. Set a token here only for defense-in-depth —
  # it is passed to the server AND baked into the web client, so the browser
  # authenticates automatically with no Settings-dialog entry.
  authToken: ""
  # bun/vite dev servers write transpile caches into /opt/bakery, so this
  # container can't take the read-only rootfs the other surfaces use.
  readOnlyRootFilesystem: false
  # Extra env for the bakery SERVER container (e.g. PI_WEB_DEFAULT_MODEL,
  # PI_WEB_ALLOWED_MODELS, PI_WEB_FAKE_AGENT).
  extraEnv: {}

resources:
  # Both containers spawn `claude` subprocesses (CloudCLI for chat sessions,
  # tmux for TUI sessions), and claude is a hungry Node process — give each a
  # roomy memory ceiling.
  ui:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  term:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 2Gi
  # Bakery server runs the coding agent (a hungry process); the Vite web is a
  # lighter dev server.
  bakeryServer:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  bakeryWeb:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 1Gi
